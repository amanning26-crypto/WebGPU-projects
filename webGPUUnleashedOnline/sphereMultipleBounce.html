<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebGPU: Orbit & Zoom Fixed</title>
  <style>
    body { margin: 0; background: #222; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
<script type="module">
  const canvas = document.querySelector("#c");

  const vec3 = {
    sub: (a, b) => [a[0] - b[0], a[1] - b[1], a[2] - b[2]],
    normalize: (v) => {
      const l = Math.hypot(v[0], v[1], v[2]);
      return l > 0 ? [v[0]/l, v[1]/l, v[2]/l] : [0,0,0];
    },
    dot: (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2]
  };

  function mat4_lookAt(eye, target, up) {
    const z = vec3.normalize(vec3.sub(eye, target));
    const x = vec3.normalize([
      up[1]*z[2] - up[2]*z[1],
      up[2]*z[0] - up[0]*z[2],
      up[0]*z[1] - up[1]*z[0]
    ]);
    const y = [
      z[1]*x[2] - z[2]*x[1],
      z[2]*x[0] - z[0]*x[2],
      z[0]*x[1] - z[1]*x[0]
    ];
    return new Float32Array([
      x[0], y[0], z[0], 0,
      x[1], y[1], z[1], 0,
      x[2], y[2], z[2], 0,
      -(x[0]*eye[0] + x[1]*eye[1] + x[2]*eye[2]),
      -(y[0]*eye[0] + y[1]*eye[1] + y[2]*eye[2]),
      -(z[0]*eye[0] + z[1]*eye[1] + z[2]*eye[2]),
      1
    ]);
  }

  function mat4_perspective(fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    const nf = 1 / (near - far);
    return new Float32Array([
      f/aspect, 0, 0, 0,
      0, f, 0, 0,
      0, 0, far*nf, -1,
      0, 0, (far*near)*nf, 0
    ]);
  }

  function mat4_multiply(a, b) {
    const out = new Float32Array(16);
    for (let c = 0; c < 4; c++) {
      for (let r = 0; r < 4; r++) {
        out[c * 4 + r] =
          a[0 * 4 + r] * b[c * 4 + 0] +
          a[1 * 4 + r] * b[c * 4 + 1] +
          a[2 * 4 + r] * b[c * 4 + 2] +
          a[3 * 4 + r] * b[c * 4 + 3];
      }
    }
    return out;
  }

  async function init() {
    if (!navigator.gpu) return;
    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();
    const context = canvas.getContext("webgpu");
    const format = navigator.gpu.getPreferredCanvasFormat();

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    context.configure({ device, format, alphaMode: "opaque" });

    const shader = device.createShaderModule({
      code: `
        struct Cam { vp: mat4x4f };
        @group(0) @binding(0) var<uniform> camera : Cam;
        struct VSOut { @builtin(position) pos: vec4f, @location(0) norm: vec3f, @location(1) col: vec3f };
        @vertex
        fn vs(@location(0) p: vec3f, @location(1) n: vec3f, @location(2) iP: vec3f, @location(3) iS: f32, @location(4) iC: vec3f) -> VSOut {
          var o: VSOut;
          o.pos = camera.vp * vec4f(p * iS + iP, 1.0);
          o.norm = n; o.col = iC;
          return o;
        }
        @fragment
        fn fs(in: VSOut) -> @location(0) vec4f {
          let l = normalize(vec3f(1, 1, 1));
          let d = max(dot(in.norm, l), 0.2);
          return vec4f(in.col * d, 1.0);
        }
      `
    });

    function createSphere(r, lat, lon) {
      let p = [], n = [], i = [];
      for (let y = 0; y <= lat; y++) {
        let v = y / lat, th = v * Math.PI;
        for (let x = 0; x <= lon; x++) {
          let u = x / lon, ph = u * Math.PI * 2;
          let sx = Math.sin(th) * Math.cos(ph), sy = Math.cos(th), sz = Math.sin(th) * Math.sin(ph);
          p.push(r * sx, r * sy, r * sz); n.push(sx, sy, sz);
        }
      }
      for (let y = 0; y < lat; y++) {
        for (let x = 0; x < lon; x++) {
          let a = y * (lon + 1) + x, b = a + lon + 1;
          i.push(a, b, a + 1, b, b + 1, a + 1);
        }
      }
      return { pos: new Float32Array(p), norm: new Float32Array(n), ind: new Uint32Array(i) };
    }

    const sData = createSphere(0.7, 24, 24);
    const mkBuf = (d, u) => {
      const b = device.createBuffer({ size: d.byteLength, usage: u, mappedAtCreation: true });
      new d.constructor(b.getMappedRange()).set(d); b.unmap(); return b;
    };

    const pB = mkBuf(sData.pos, GPUBufferUsage.VERTEX);
    const nB = mkBuf(sData.norm, GPUBufferUsage.VERTEX);
    const iB = mkBuf(sData.ind, GPUBufferUsage.INDEX);

    const pipeline = device.createRenderPipeline({
      layout: "auto",
      vertex: { module: shader, entryPoint: "vs", buffers: [
        { arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] },
        { arrayStride: 12, attributes: [{ shaderLocation: 1, offset: 0, format: "float32x3" }] },
        { arrayStride: 32, stepMode: "instance", attributes: [
          { shaderLocation: 2, offset: 0, format: "float32x3" },
          { shaderLocation: 3, offset: 12, format: "float32" },
          { shaderLocation: 4, offset: 16, format: "float32x3" }
        ]}
      ]},
      fragment: { module: shader, entryPoint: "fs", targets: [{ format }] },
      primitive: { topology: "triangle-list", cullMode: "back" },
      depthStencil: { format: "depth24plus", depthWriteEnabled: true, depthCompare: "less" }
    });

    const SPHERE_COUNT = 30;
    const spheres = Array.from({ length: SPHERE_COUNT }, () => {
      const size = 0.3 + Math.random()*0.4;
      return {
        x: (Math.random()-0.5)*6,
        y: (Math.random()-0.5)*6,
        z: (Math.random()-0.5)*6 - 3,
        vx: (Math.random()-0.5)*0.02,
        vy: (Math.random()-0.5)*0.02,
        vz: (Math.random()-0.5)*0.02,
        size,
        mass: size * size * size, // mass ∝ volume
        r: Math.random(), g: Math.random(), b: Math.random()
      };
    });

    const instB = device.createBuffer({ size: SPHERE_COUNT * 32, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
    const camB = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
    const camBG = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: camB } }] });

    let dT = device.createTexture({ size: [canvas.width, canvas.height], format: "depth24plus", usage: GPUTextureUsage.RENDER_ATTACHMENT });

    let zoom = 15, yaw = 0, pitch = 0.3, isR = false, lX = 0, lY = 0;

    canvas.addEventListener('wheel', e => { zoom = Math.max(2, Math.min(40, zoom + e.deltaY * 0.01)); }, { passive: true });
    canvas.addEventListener('mousedown', e => { if (e.button === 2) { isR = true; lX = e.clientX; lY = e.clientY; } });
    window.addEventListener('mouseup', e => { if (e.button === 2) isR = false; });
    window.addEventListener('mousemove', e => {
      if (isR) {
        yaw -= (e.clientX - lX) * 0.005;
        pitch = Math.max(-1.5, Math.min(1.5, pitch + (e.clientY - lY) * 0.005));
        lX = e.clientX; lY = e.clientY;
      }
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function handleSphereCollisions() {
      const e = 1.0; // perfectly elastic
      for (let i = 0; i < SPHERE_COUNT; i++) {
        for (let j = i + 1; j < SPHERE_COUNT; j++) {
          const a = spheres[i], b = spheres[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dz = a.z - b.z;
          const distSq = dx*dx + dy*dy + dz*dz;
          const minDist = a.size + b.size;
          if (distSq === 0 || distSq > minDist*minDist) continue;

          const dist = Math.sqrt(distSq);
          const nx = dx / dist;
          const ny = dy / dist;
          const nz = dz / dist;

          // positional correction
          const penetration = minDist - dist;
          const totalMass = a.mass + b.mass;
          const corrAx = nx * penetration * (b.mass / totalMass);
          const corrAy = ny * penetration * (b.mass / totalMass);
          const corrAz = nz * penetration * (b.mass / totalMass);
          const corrBx = nx * penetration * (a.mass / totalMass);
          const corrBy = ny * penetration * (a.mass / totalMass);
          const corrBz = nz * penetration * (a.mass / totalMass);

          a.x += corrAx; a.y += corrAy; a.z += corrAz;
          b.x -= corrBx; b.y -= corrBy; b.z -= corrBz;

          // relative velocity along normal
          const rvx = a.vx - b.vx;
          const rvy = a.vy - b.vy;
          const rvz = a.vz - b.vz;
          const relVelN = rvx*nx + rvy*ny + rvz*nz;
          if (relVelN >= 0) continue; // already separating

          const invMassA = 1 / a.mass;
          const invMassB = 1 / b.mass;
          const j = -(1 + e) * relVelN / (invMassA + invMassB);

          const jx = j * nx;
          const jy = j * ny;
          const jz = j * nz;

          a.vx += jx * invMassA;
          a.vy += jy * invMassA;
          a.vz += jz * invMassA;

          b.vx -= jx * invMassB;
          b.vy -= jy * invMassB;
          b.vz -= jz * invMassB;
        }
      }
    }

    function frame() {
      const iD = new Float32Array(SPHERE_COUNT * 8);

      // integrate + wall bounces
      spheres.forEach((s, i) => {
        s.x += s.vx;
        s.y += s.vy;
        s.z += s.vz;

        if (Math.abs(s.x) > 5) { s.x = Math.sign(s.x) * 5; s.vx *= -1; }
        if (Math.abs(s.y) > 5) { s.y = Math.sign(s.y) * 5; s.vy *= -1; }
        if (s.z > 2) { s.z = 2; s.vz *= -1; }
        if (s.z < -8) { s.z = -8; s.vz *= -1; }
      });

      // sphere–sphere collisions
      handleSphereCollisions();

      spheres.forEach((s, i) => {
        iD.set([s.x, s.y, s.z, s.size, s.r, s.g, s.b, 0], i * 8);
      });
      device.queue.writeBuffer(instB, 0, iD);

      const target = [0, 0, -3];
      const eye = [
        target[0] + Math.sin(yaw) * Math.cos(pitch) * zoom,
        target[1] + Math.sin(pitch) * zoom,
        target[2] + Math.cos(yaw) * Math.cos(pitch) * zoom
      ];

      const vM = mat4_lookAt(eye, target, [0, 1, 0]);
      const pM = mat4_perspective(1.0, canvas.width / canvas.height, 0.1, 100);
      device.queue.writeBuffer(camB, 0, mat4_multiply(pM, vM));

      const enc = device.createCommandEncoder();
      const pass = enc.beginRenderPass({
        colorAttachments: [{ view: context.getCurrentTexture().createView(), clearValue: [0.1, 0.1, 0.1, 1], loadOp: "clear", storeOp: "store" }],
        depthStencilAttachment: { view: dT.createView(), depthClearValue: 1, depthLoadOp: "clear", depthStoreOp: "store" }
      });
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, camBG);
      pass.setVertexBuffer(0, pB);
      pass.setVertexBuffer(1, nB);
      pass.setVertexBuffer(2, instB);
      pass.setIndexBuffer(iB, "uint32");
      pass.drawIndexed(sData.ind.length, SPHERE_COUNT);
      pass.end();
      device.queue.submit([enc.finish()]);
      requestAnimationFrame(frame);
    }
    frame();
  }
  init();
</script>

</body>
</html>
