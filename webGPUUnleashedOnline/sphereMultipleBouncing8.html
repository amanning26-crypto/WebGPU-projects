<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebGPU: Unique Textures & Physics</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 220px;
            border: 1px solid #444;
            z-index: 10;
        }

        .row {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            margin-bottom: 5px;
            color: #888;
            text-transform: uppercase;
        }

        input[type=range] {
            cursor: pointer;
            accent-color: #0f0;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
        }

        .val {
            float: right;
            color: #0f0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="row">
            <label>Spheres <span id="cntV" class="val">30</span></label>
            <input type="range" id="cntI" min="5" max="600" value="30">
        </div>
        <div class="row">
            <label>Speed <span id="velV" class="val">1.0</span></label>
            <input type="range" id="velI" min="0" max="300" value="100">
        </div>
        <div class="row">
            <label>Friction <span id="fricV" class="val">1.00</span></label>
            <input type="range" id="fricI" min="990" max="1010" value="1000">
        </div>
        <button id="resetBtn">RESTART</button>
    </div>
    <canvas id="c"></canvas>

    <script type="module">
        // Select the canvas element from the HTML
        const canvas = document.querySelector("#c");

        // Math helper: Vector3 operations for physics and 3D positioning
        const vec3 = {
            sub: (a, b) => [
                a[0] - b[0],
                a[1] - b[1],
                a[2] - b[2]
            ],
            add: (a, b) => [
                a[0] + b[0],
                a[1] + b[1],
                a[2] + b[2]
            ],
            mul: (a, s) => [
                a[0] * s,
                a[1] * s,
                a[2] * s
            ],
            dot: (a, b) =>
                a[0] * b[0] +
                a[1] * b[1] +
                a[2] * b[2],
            normalize: (v) => {
                let l = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
                if (l === 0) return [0, 0, 0];
                return [v[0] / l, v[1] / l, v[2] / l];
            },
            cross: (a, b) => [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ],
            len: (v) => Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2])
        };

        // Math helper: Multiply two 4x4 matrices
        function mat4_multiply(a, b) {
            let out = new Float32Array(16);
            for (let c = 0; c < 4; c++) {
                for (let r = 0; r < 4; r++) {
                    out[c * 4 + r] =
                        a[0 * 4 + r] * b[c * 4 + 0] +
                        a[1 * 4 + r] * b[c * 4 + 1] +
                        a[2 * 4 + r] * b[c * 4 + 2] +
                        a[3 * 4 + r] * b[c * 4 + 3];
                }
            }
            return out;
        }

        // Math helper: Create a camera "view" matrix
        function mat4_lookAt(eye, target, up) {
            let z = vec3.normalize(vec3.sub(eye, target));
            let x = vec3.normalize(vec3.cross(up, z));
            let y = vec3.cross(z, x);
            return new Float32Array([
                x[0], y[0], z[0], 0,
                x[1], y[1], z[1], 0,
                x[2], y[2], z[2], 0,
                -vec3.dot(x, eye), -vec3.dot(y, eye), -vec3.dot(z, eye), 1
            ]);
        }

        // Math helper: Create a perspective matrix
        function mat4_perspective(fov, aspect, near, far) {
            let f = 1.0 / Math.tan(fov / 2);
            let nf = 1 / (near - far);
            return new Float32Array([
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, far * nf, -1,
                0, 0, far * near * nf, 0
            ]);
        }

        // Main initialization function
        async function init() {
            // Setup WebGPU connection
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            const context = canvas.getContext("webgpu");
            const format = navigator.gpu.getPreferredCanvasFormat();

            // Handle canvas sizing
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            context.configure({
                device,
                format,
                alphaMode: "opaque"
            });

            // The WGSL Shader code (runs on the GPU)
            const shader = device.createShaderModule({
                code: `
          struct Cam { vp: mat4x4f };
          @group(0) @binding(0) var<uniform> camera : Cam;
          @group(0) @binding(1) var samp : sampler;
          @group(0) @binding(2) var texArray : texture_2d_array<f32>;

          struct VSOut { 
            @builtin(position) pos: vec4f, 
            @location(0) uv: vec2f, 
            @location(1) @interpolate(flat) texIdx: u32,
            @location(2) norm: vec3f 
          };

          @vertex
          fn vs_sphere(
            @location(0) p: vec3f, 
            @location(1) n: vec3f, 
            @location(2) uv: vec2f,
            @location(3) iP: vec3f, 
            @location(4) iS: f32, 
            @location(5) r0: vec3f,
            @location(6) r1: vec3f,
            @location(7) r2: vec3f,
            @location(8) tIdx: u32
          ) -> VSOut {
            var o: VSOut;
            let rotMat = mat3x3f(r0, r1, r2);
            let rotP = rotMat * p;
            let rotN = rotMat * n;
            o.pos = camera.vp * vec4f(rotP * iS + iP, 1.0);
            o.uv = uv; 
            o.texIdx = tIdx; 
            o.norm = rotN;
            return o;
          }

          @vertex
          fn vs_box(@location(0) p: vec3f) -> @builtin(position) vec4f {
            return camera.vp * vec4f(p.x, p.y, p.z - 3.0, 1.0);
          }

          @fragment
          fn fs_sphere(in: VSOut) -> @location(0) vec4f {
            // Pick the specific texture layer for this sphere
            let color = textureSample(texArray, samp, in.uv, in.texIdx);
            let light = normalize(vec3f(1.0, 1.0, 1.0));
            let d = max(dot(in.norm, light), 0.3);
            return vec4f(color.rgb * d, 1.0);
          }

          @fragment
          fn fs_box() -> @location(0) vec4f { 
            return vec4f(0.0, 0.5, 0.8, 0.1); 
          }
          
          @fragment
          fn fs_edges() -> @location(0) vec4f { 
            return vec4f(0.8, 0.8, 0.8, 1.0); 
          }
        `
            });

            // Global Texture variables
            const texSize = 128;
            let textureArray = null;
            const sampler = device.createSampler({
                magFilter: 'linear',
                minFilter: 'linear'
            });

            // --- Geometry Helpers ---
            function createSphere(r, lat, lon) {
                let p = [];
                let n = [];
                let uv = [];
                let i = [];
                for (let y = 0; y <= lat; y++) {
                    let v = y / lat;
                    let th = v * Math.PI;
                    for (let x = 0; x <= lon; x++) {
                        let u = x / lon;
                        let ph = u * Math.PI * 2;
                        let sx = Math.sin(th) * Math.cos(ph);
                        let sy = Math.cos(th);
                        let sz = Math.sin(th) * Math.sin(ph);
                        p.push(r * sx, r * sy, r * sz);
                        n.push(sx, sy, sz);
                        uv.push(u, v);
                    }
                }
                for (let y = 0; y < lat; y++) {
                    for (let x = 0; x < lon; x++) {
                        let a = y * (lon + 1) + x;
                        let b = a + lon + 1;
                        i.push(a, b, a + 1, b, b + 1, a + 1);
                    }
                }
                return {
                    pos: new Float32Array(p),
                    norm: new Float32Array(n),
                    uv: new Float32Array(uv),
                    ind: new Uint32Array(i)
                };
            }

            function createBox(s) {
                const p = new Float32Array([
                    -s, -s, s, s, -s, s, s, s, s, -s, s, s,
                    -s, -s, -s, s, -s, -s, s, s, -s, -s, s, -s
                ]);
                const faces = new Uint16Array([
                    0, 1, 2, 0, 2, 3, 5, 4, 7, 5, 7, 6, 4, 0, 3, 4, 3, 7, 1, 5, 6, 1, 6, 2, 3, 2, 6, 3, 6, 7, 4, 5, 1, 4, 1, 0
                ]);
                const edges = new Uint16Array([
                    0, 1, 1, 2, 2, 3, 3, 0, 4, 5, 5, 6, 6, 7, 7, 4, 0, 4, 1, 5, 2, 6, 3, 7
                ]);
                return { pos: p, faces, edges };
            }

            // Generate static geometry data
            const sData = createSphere(1.0, 24, 24);
            const bData = createBox(5.0);

            // Helper to create a GPU buffer and fill it with data immediately
            const mkB = (d, u) => {
                let b = device.createBuffer({
                    size: d.byteLength,
                    usage: u,
                    mappedAtCreation: true
                });
                new d.constructor(b.getMappedRange()).set(d);
                b.unmap();
                return b;
            };

            // Upload geometry to GPU
            const spPB = mkB(sData.pos, GPUBufferUsage.VERTEX);
            const spNB = mkB(sData.norm, GPUBufferUsage.VERTEX);
            const spUVB = mkB(sData.uv, GPUBufferUsage.VERTEX);
            const spIB = mkB(sData.ind, GPUBufferUsage.INDEX);
            const bxPB = mkB(bData.pos, GPUBufferUsage.VERTEX);
            const bxFIB = mkB(bData.faces, GPUBufferUsage.INDEX);
            const bxEIB = mkB(bData.edges, GPUBufferUsage.INDEX);

            // Create a small buffer for the camera matrix
            const camBuf = device.createBuffer({
                size: 64,
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
            });

            // Define how data is bound to the shader
            const bindGroupLayout = device.createBindGroupLayout({
                entries: [
                    { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: "uniform" } },
                    { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
                    { binding: 2, visibility: GPUShaderStage.FRAGMENT, texture: { viewDimension: '2d-array' } }
                ]
            });

            const sharedLayout = device.createPipelineLayout({
                bindGroupLayouts: [bindGroupLayout]
            });

            // --- Rendering Pipelines (Rules for how to draw) ---
            const spherePipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: {
                    module: shader,
                    entryPoint: "vs_sphere",
                    buffers: [
                        { arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] },
                        { arrayStride: 12, attributes: [{ shaderLocation: 1, offset: 0, format: "float32x3" }] },
                        { arrayStride: 8, attributes: [{ shaderLocation: 2, offset: 0, format: "float32x2" }] },
                        {
                            arrayStride: 56, stepMode: "instance", attributes: [
                                { shaderLocation: 3, offset: 0, format: "float32x3" },
                                { shaderLocation: 4, offset: 12, format: "float32" },
                                { shaderLocation: 5, offset: 16, format: "float32x3" },
                                { shaderLocation: 6, offset: 28, format: "float32x3" },
                                { shaderLocation: 7, offset: 40, format: "float32x3" },
                                { shaderLocation: 8, offset: 52, format: "uint32" }
                            ]
                        }
                    ]
                },
                fragment: {
                    module: shader,
                    entryPoint: "fs_sphere",
                    targets: [{ format }]
                },
                primitive: { topology: "triangle-list", cullMode: "back" },
                depthStencil: {
                    format: "depth24plus",
                    depthWriteEnabled: true,
                    depthCompare: "less"
                }
            });

            const boxPipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: {
                    module: shader,
                    entryPoint: "vs_box",
                    buffers: [{ arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] }]
                },
                fragment: {
                    module: shader,
                    entryPoint: "fs_box",
                    targets: [{
                        format,
                        blend: {
                            color: { srcFactor: "src-alpha", dstFactor: "one-minus-src-alpha", operation: "add" },
                            alpha: { srcFactor: "one", dstFactor: "one", operation: "add" }
                        }
                    }]
                },
                primitive: { topology: "triangle-list" },
                depthStencil: {
                    format: "depth24plus",
                    depthWriteEnabled: false,
                    depthCompare: "less"
                }
            });

            const edgePipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: {
                    module: shader,
                    entryPoint: "vs_box",
                    buffers: [{ arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] }]
                },
                fragment: {
                    module: shader,
                    entryPoint: "fs_edges",
                    targets: [{ format }]
                },
                primitive: { topology: "line-list" },
                depthStencil: {
                    format: "depth24plus",
                    depthWriteEnabled: false,
                    depthCompare: "less"
                }
            });

            // Simulation State
            let spheres = [];
            let instB = null;
            let dT = null;
            let camBG = null;
            let zoom = 20;
            let yaw = 0;
            let pitch = 0.3;
            let isR = false;
            let lX = 0;
            let lY = 0;

            // Reset Simulation: This creates new textures and spheres
            function resetSim() {
                const count = parseInt(document.getElementById('cntI').value);

                // 1. Create a texture array with exactly 'count' layers
                if (textureArray) textureArray.destroy();
                textureArray = device.createTexture({
                    size: [texSize, texSize, count],
                    format: 'rgba8unorm',
                    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
                });

                // 2. Generate a unique texture for every single sphere
                for (let i = 0; i < count; i++) {
                    const data = new Uint8Array(texSize * texSize * 4);
                    // Pick a unique random base color for this specific sphere
                    const r = Math.random() * 255;
                    const g = Math.random() * 255;
                    const b = Math.random() * 255;
                    for (let j = 0; j < data.length; j += 4) {
                        const x = (j / 4) % texSize;
                        const y = Math.floor((j / 4) / texSize);
                        // Create a custom pattern (stripes, dots, or grids)
                        const isPattern = (x % 16 < 2 || y % 16 < 2 || (x + y) % 32 < 2);
                        data[j] = isPattern ? 255 : r;
                        data[j + 1] = isPattern ? 255 : g;
                        data[j + 2] = isPattern ? 255 : b;
                        data[j + 3] = 255;
                    }
                    // Upload this specific layer to the GPU
                    device.queue.writeTexture(
                        { texture: textureArray, origin: [0, 0, i] },
                        data,
                        { bytesPerRow: texSize * 4 },
                        [texSize, texSize, 1]
                    );
                }

                // 3. Update the BindGroup to point to the new texture array
                camBG = device.createBindGroup({
                    layout: bindGroupLayout,
                    entries: [
                        { binding: 0, resource: { buffer: camBuf } },
                        { binding: 1, resource: sampler },
                        { binding: 2, resource: textureArray.createView() }
                    ]
                });

                // 4. Initialize sphere physics objects
                spheres = Array.from({ length: count }, (v, i) => {
                    let s = 0.4 + Math.random() * 0.7;
                    return {
                        p: [(Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7, (Math.random() - 0.5) * 6 - 3],
                        v: [(Math.random() - 0.5) * 0.1, (Math.random() - 0.5) * 0.1, (Math.random() - 0.5) * 0.1],
                        size: s,
                        mass: s ** 3,
                        rot: new Float32Array([1, 0, 0, 0, 1, 0, 0, 0, 1]),
                        tIdx: i // Assign the unique texture layer index
                    };
                });

                // Clear and recreate instance buffer
                if (instB) instB.destroy();
                instB = device.createBuffer({
                    size: count * 56,
                    usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
                });

                // Setup Depth Texture
                if (dT) dT.destroy();
                dT = device.createTexture({
                    size: [canvas.width, canvas.height],
                    format: "depth24plus",
                    usage: GPUTextureUsage.RENDER_ATTACHMENT
                });
            }

            // Matrix rotation helper for sphere rolling
            function rotateM(m, axis, angle) {
                let x = axis[0], y = axis[1], z = axis[2];
                let s = Math.sin(angle), c = Math.cos(angle), t = 1 - c;
                let r = [
                    t * x * x + c, t * x * y - s * z, t * x * z + s * y,
                    t * x * y + s * z, t * y * y + c, t * y * z - s * x,
                    t * x * z - s * y, t * y * z + s * x, t * z * z + c
                ];
                let res = new Float32Array(9);
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        res[i * 3 + j] = r[i * 3 + 0] * m[0 * 3 + j] + r[i * 3 + 1] * m[1 * 3 + j] + r[i * 3 + 2] * m[2 * 3 + j];
                    }
                }
                return res;
            }

            // UI Event Listeners
            document.getElementById('cntI').oninput = e => document.getElementById('cntV').innerText = e.target.value;
            document.getElementById('velI').oninput = e => document.getElementById('velV').innerText = (e.target.value / 100).toFixed(1);
            document.getElementById('fricI').oninput = e => document.getElementById('fricV').innerText = (e.target.value / 1000).toFixed(2);
            document.getElementById('resetBtn').onclick = resetSim;

            // Interaction listeners
            canvas.onmousedown = e => { if (e.button === 2) { isR = true; lX = e.clientX; lY = e.clientY; } };
            window.onmouseup = e => { if (e.button === 2) isR = false; };
            window.onmousemove = e => {
                if (isR) {
                    yaw -= (e.clientX - lX) * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch + (e.clientY - lY) * 0.005));
                    lX = e.clientX;
                    lY = e.clientY;
                }
            };
            canvas.onwheel = e => { zoom = Math.max(5, Math.min(60, zoom + e.deltaY * 0.02)); };
            canvas.oncontextmenu = e => e.preventDefault();

            // The Animation Loop (runs ~60 times per second)
            function frame() {
                const speed = parseInt(document.getElementById('velI').value) / 100;
                const fric = parseInt(document.getElementById('fricI').value) / 1000;

                if (!dT || !instB) {
                    requestAnimationFrame(frame);
                    return;
                }


                if (dT.width !== canvas.width || dT.height !== canvas.height) {
                    dT.destroy();
                    dT = device.createTexture({
                        size: [canvas.width, canvas.height],
                        format: "depth24plus",
                        usage: GPUTextureUsage.RENDER_ATTACHMENT
                    });
                }

                // Physics update
                spheres.forEach((s, i) => {
                    s.v = vec3.mul(s.v, fric);
                    s.p = vec3.add(s.p, vec3.mul(s.v, speed));

                    let vLen = vec3.len(s.v);
                    if (vLen > 0.001) {
                        let axis = vec3.normalize(vec3.cross(s.v, [0, 1, 0]));
                        if (vec3.len(axis) < 0.1) axis = [1, 0, 0];
                        s.rot = rotateM(s.rot, axis, vLen * speed * 2);
                    }

                    // Bound checking (Box collision)
                    [0, 1, 2].forEach(a => {
                        let limit;
                        if (a === 2) {
                            limit = (s.p[a] > 2 - s.size || s.p[a] < -8 + s.size);
                        } else {
                            limit = (Math.abs(s.p[a]) > 5 - s.size);
                        }

                        if (limit) {
                            s.v[a] *= -1.0;
                            s.p[a] = (a === 2) ? (s.p[a] > 0 ? 2 - s.size : -8 + s.size) : Math.sign(s.p[a]) * (5 - s.size);
                        }
                    });

                    // Sphere vs Sphere collision
                    for (let j = i + 1; j < spheres.length; j++) {
                        let s2 = spheres[j];
                        let dV = vec3.sub(s2.p, s.p);
                        let dist = Math.sqrt(vec3.dot(dV, dV));
                        let minD = s.size + s2.size;
                        if (dist < minD) {
                            let n = vec3.normalize(dV);
                            let sepV = vec3.dot(vec3.sub(s2.v, s.v), n);
                            if (sepV > 0) continue;
                            let impS = -2.0 * sepV / (1 / s.mass + 1 / s2.mass);
                            let imp = vec3.mul(n, impS);
                            s.v = vec3.sub(s.v, vec3.mul(imp, 1 / s.mass));
                            s2.v = vec3.add(s2.v, vec3.mul(imp, 1 / s2.mass));
                            let c = vec3.mul(n, (minD - dist) * 0.1);
                            s.p = vec3.sub(s.p, c);
                            s2.p = vec3.add(s2.p, c);
                        }
                    }
                });

                // Upload instance data (positions/rotations/texIndices) to the GPU
                const iD = new Float32Array(spheres.length * 14);
                const iD32 = new Uint32Array(iD.buffer);

                spheres.forEach((s, i) => {
                    const offset = i * 14;
                    iD.set(s.p, offset + 0);
                    iD[offset + 3] = s.size;
                    iD.set(s.rot, offset + 4);
                    iD32[offset + 13] = s.tIdx;
                });
                device.queue.writeBuffer(instB, 0, iD);

                // Update camera position
                const target = [0, 0, -3];
                const eye = [
                    target[0] + Math.sin(yaw) * Math.cos(pitch) * zoom,
                    target[1] + Math.sin(pitch) * zoom,
                    target[2] + Math.cos(yaw) * Math.cos(pitch) * zoom
                ];
                const vM = mat4_lookAt(eye, target, [0, 1, 0]);
                const pM = mat4_perspective(1.0, canvas.width / canvas.height, 0.1, 100);
                device.queue.writeBuffer(camBuf, 0, mat4_multiply(pM, vM));

                // Start drawing commands
                const enc = device.createCommandEncoder();
                const pass = enc.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: [0.05, 0.05, 0.05, 1],
                        loadOp: "clear",
                        storeOp: "store"
                    }],
                    depthStencilAttachment: {
                        view: dT.createView(),
                        depthClearValue: 1,
                        loadOp: "clear",
                        depthStoreOp: "store"
                    }
                });

                pass.setBindGroup(0, camBG);

                // Draw spheres
                pass.setPipeline(spherePipe);
                pass.setVertexBuffer(0, spPB);
                pass.setVertexBuffer(1, spNB);
                pass.setVertexBuffer(2, spUVB);
                pass.setVertexBuffer(3, instB);
                pass.setIndexBuffer(spIB, "uint32");
                pass.drawIndexed(sData.ind.length, spheres.length);

                // Draw the container box
                pass.setPipeline(boxPipe);
                pass.setVertexBuffer(0, bxPB);
                pass.setIndexBuffer(bxFIB, "uint16");
                pass.drawIndexed(bData.faces.length);

                // Draw the container edges
                pass.setPipeline(edgePipe);
                pass.setIndexBuffer(bxEIB, "uint16");
                pass.drawIndexed(bData.edges.length);

                pass.end();
                device.queue.submit([enc.finish()]);
                requestAnimationFrame(frame);
            }

            // Kick off the simulation
            resetSim();
            frame();
        }
        init();
    </script>
</body>
