<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebGPU Physics Lab</title>
  <style>
    body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
    canvas { width: 100vw; height: 100vh; display: block; }
    #ui { 
      position: absolute; top: 20px; left: 20px; 
      background: rgba(0, 0, 0, 0.8); color: white; 
      padding: 20px; border-radius: 10px; width: 220px;
      user-select: none; border: 1px solid #444;
    }
    .row { margin-bottom: 15px; display: flex; flex-direction: column; }
    label { font-size: 12px; margin-bottom: 5px; color: #aaa; text-transform: uppercase; }
    input[type=range] { cursor: pointer; }
    button { 
      background: #444; color: white; border: none; padding: 10px; 
      cursor: pointer; border-radius: 4px; font-weight: bold;
    }
    button:hover { background: #666; }
    .val { float: right; color: #0f0; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="row">
      <label>Sphere Count <span id="cntV" class="val">30</span></label>
      <input type="range" id="cntI" min="2" max="150" value="30">
    </div>
    <div class="row">
      <label>Initial Velocity <span id="velV" class="val">1.0</span></label>
      <input type="range" id="velI" min="0" max="300" value="100">
    </div>
    <div class="row">
      <label>Friction (Air) <span id="fricV" class="val">0%</span></label>
      <input type="range" id="fricI" min="900" max="1000" value="1000">
    </div>
    <button id="resetBtn">APPLY & RESTART</button>
    <p style="font-size: 10px; color: #777; margin-top: 15px;">Right-Click: Rotate<br>Wheel: Zoom</p>
  </div>
  <canvas id="c"></canvas>

  <script type="module">
    const canvas = document.querySelector("#c");
    
    // --- 3D Math Helpers ---
    const vec3 = {
      sub: (a, b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]],
      add: (a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]],
      mul: (a, s) => [a[0]*s, a[1]*s, a[2]*s],
      dot: (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2],
      normalize: (v) => { let l = Math.sqrt(v[0]**2 + v[1]**2 + v[2]**2); return l > 0 ? [v[0]/l, v[1]/l, v[2]/l] : [0,0,0]; },
      cross: (a, b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]],
      dist: (a, b) => Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2)
    };

    function mat4_multiply(a, b) {
      let out = new Float32Array(16);
      for(let c=0; c<4; c++) for(let r=0; r<4; r++) out[c*4+r] = a[0*4+r]*b[c*4+0] + a[1*4+r]*b[c*4+1] + a[2*4+r]*b[c*4+2] + a[3*4+r]*b[c*4+3];
      return out;
    }

    function mat4_lookAt(eye, target, up) {
      let z = vec3.normalize(vec3.sub(eye, target)), x = vec3.normalize(vec3.cross(up, z)), y = vec3.cross(z, x);
      return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0, -vec3.dot(x,eye), -vec3.dot(y,eye), -vec3.dot(z,eye), 1]);
    }

    function mat4_perspective(fov, aspect, near, far) {
      let f = 1.0/Math.tan(fov/2), nf = 1/(near-far);
      return new Float32Array([f/aspect,0,0,0, 0,f,0,0, 0,0,far*nf,-1, 0,0,far*near*nf,0]);
    }

    async function init() {
      if (!navigator.gpu) return;
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      const context = canvas.getContext("webgpu");
      const format = navigator.gpu.getPreferredCanvasFormat();
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      context.configure({ device, format, alphaMode: "opaque" });

      const shader = device.createShaderModule({
        code: `
          struct Cam { vp: mat4x4f };
          @group(0) @binding(0) var<uniform> camera : Cam;
          struct VSOut { @builtin(position) pos: vec4f, @location(0) norm: vec3f, @location(1) col: vec3f };
          @vertex
          fn vs(@location(0) p: vec3f, @location(1) n: vec3f, @location(2) iP: vec3f, @location(3) iS: f32, @location(4) iC: vec3f) -> VSOut {
            var o: VSOut;
            o.pos = camera.vp * vec4f(p * iS + iP, 1.0);
            o.norm = n; o.col = iC;
            return o;
          }
          @fragment
          fn fs(in: VSOut) -> @location(0) vec4f {
            let d = max(dot(in.norm, normalize(vec3f(1, 1, 1))), 0.15);
            return vec4f(in.col * d + 0.05, 1.0);
          }
        `
      });

      // --- Geometry ---
      function createSphere(r, lat, lon) {
        let p=[], n=[], i=[];
        for(let y=0; y<=lat; y++) {
          let th = (y/lat)*Math.PI;
          for(let x=0; x<=lon; x++) {
            let ph = (x/lon)*Math.PI*2;
            let sx=Math.sin(th)*Math.cos(ph), sy=Math.cos(th), sz=Math.sin(th)*Math.sin(ph);
            p.push(r*sx,r*sy,r*sz); n.push(sx,sy,sz);
          }
        }
        for(let y=0; y<lat; y++) for(let x=0; x<lon; x++) {
          let a=y*(lon+1)+x, b=a+lon+1; i.push(a,b,a+1, b,b+1,a+1);
        }
        return { pos: new Float32Array(p), norm: new Float32Array(n), ind: new Uint32Array(i) };
      }

      const sData = createSphere(1.0, 20, 20);
      const mkB = (d, u) => {
        let b = device.createBuffer({ size: d.byteLength, usage: u, mappedAtCreation: true });
        new d.constructor(b.getMappedRange()).set(d); b.unmap(); return b;
      };
      const pB = mkB(sData.pos, GPUBufferUsage.VERTEX);
      const nB = mkB(sData.norm, GPUBufferUsage.VERTEX);
      const iB = mkB(sData.ind, GPUBufferUsage.INDEX);
      const camBuf = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

      const pipeline = device.createRenderPipeline({
        layout: "auto",
        vertex: { module: shader, entryPoint: "vs", buffers: [
          { arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] },
          { arrayStride: 12, attributes: [{ shaderLocation: 1, offset: 0, format: "float32x3" }] },
          { arrayStride: 32, stepMode: "instance", attributes: [
            { shaderLocation: 2, offset: 0, format: "float32x3" },
            { shaderLocation: 3, offset: 12, format: "float32" },
            { shaderLocation: 4, offset: 16, format: "float32x3" }
          ]}
        ]},
        fragment: { module: shader, entryPoint: "fs", targets: [{ format }] },
        primitive: { topology: "triangle-list", cullMode: "back" },
        depthStencil: { format: "depth24plus", depthWriteEnabled: true, depthCompare: "less" }
      });

      const camBG = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: camBuf } }] });

      // --- Simulation State ---
      let spheres = [], instB = null, dT = null;
      let zoom = 15, yaw = 0, pitch = 0.3, isR = false, lX = 0, lY = 0;

      function resetSimulation() {
        const count = parseInt(document.getElementById('cntI').value);
        const vScale = parseInt(document.getElementById('velI').value) / 1000;
        
        spheres = Array.from({ length: count }, () => {
          let size = 0.2 + Math.random() * 0.6;
          return {
            p: [(Math.random()-0.5)*8, (Math.random()-0.5)*8, (Math.random()-0.5)*8 - 3],
            v: [(Math.random()-0.5)*vScale, (Math.random()-0.5)*vScale, (Math.random()-0.5)*vScale],
            size, mass: Math.pow(size, 3), // Mass proportional to Volume
            c: [Math.random(), Math.random(), Math.random()]
          };
        });

        if (instB) instB.destroy();
        instB = device.createBuffer({ size: count * 32, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
        dT = device.createTexture({ size: [canvas.width, canvas.height], format: "depth24plus", usage: GPUTextureUsage.RENDER_ATTACHMENT });
      }

      // --- UI Events ---
      document.getElementById('cntI').oninput = e => document.getElementById('cntV').innerText = e.target.value;
      document.getElementById('velI').oninput = e => document.getElementById('velV').innerText = (e.target.value/100).toFixed(1);
      document.getElementById('fricI').oninput = e => document.getElementById('fricV').innerText = ((1000 - e.target.value)/10).toFixed(1) + "%";
      document.getElementById('resetBtn').onclick = resetSimulation;

      canvas.onmousedown = e => { if (e.button === 2) { isR = true; lX = e.clientX; lY = e.clientY; } };
      window.onmouseup = e => { if (e.button === 2) isR = false; };
      window.onmousemove = e => { if (isR) { yaw -= (e.clientX-lX)*0.005; pitch = Math.max(-1.5, Math.min(1.5, pitch+(e.clientY-lY)*0.005)); lX=e.clientX; lY=e.clientY; } };
      canvas.onwheel = e => { zoom = Math.max(3, Math.min(50, zoom + e.deltaY*0.01)); };
      canvas.oncontextmenu = e => e.preventDefault();

      function frame() {
        const fric = parseInt(document.getElementById('fricI').value) / 1000;
        
        // Physics
        for(let i=0; i<spheres.length; i++) {
          let s = spheres[i];
          s.v[0]*=fric; s.v[1]*=fric; s.v[2]*=fric;
          s.p[0]+=s.v[0]; s.p[1]+=s.v[1]; s.p[2]+=s.v[2];

          // Wall Collisions
          const b = 5;
          if(Math.abs(s.p[0]) > b) { s.v[0]*=-1; s.p[0]=Math.sign(s.p[0])*b; }
          if(Math.abs(s.p[1]) > b) { s.v[1]*=-1; s.p[1]=Math.sign(s.p[1])*b; }
          if(s.p[2] > 2 || s.p[2] < -8) { s.v[2]*=-1; s.p[2]=s.p[2]>0?2:-8; }

          // Sphere-Sphere Collisions
          for(let j=i+1; j<spheres.length; j++) {
            let s2 = spheres[j];
            let dVec = vec3.sub(s2.p, s.p);
            let dist = Math.sqrt(dVec[0]**2 + dVec[1]**2 + dVec[2]**2);
            let minDist = s.size + s2.size;

            if(dist < minDist) {
              let normal = vec3.normalize(dVec);
              let relV = vec3.sub(s2.v, s.v);
              let sepV = vec3.dot(relV, normal);
              if(sepV > 0) continue;

              let jImpulse = -(1.9) * sepV / (1/s.mass + 1/s2.mass);
              let impulse = vec3.mul(normal, jImpulse);

              s.v = vec3.sub(s.v, vec3.mul(impulse, 1/s.mass));
              s2.v = vec3.add(s2.v, vec3.mul(impulse, 1/s2.mass));
              
              // Positional Correction
              let corr = (minDist - dist) * 0.5;
              s.p = vec3.sub(s.p, vec3.mul(normal, corr));
              s2.p = vec3.add(s2.p, vec3.mul(normal, corr));
            }
          }
        }

        // Buffer Data
        const iD = new Float32Array(spheres.length * 8);
        spheres.forEach((s, i) => iD.set([...s.p, s.size, ...s.c, 0], i*8));
        device.queue.writeBuffer(instB, 0, iD);

        // Camera
        const target = [0, 0, -3];
        const eye = [target[0]+Math.sin(yaw)*Math.cos(pitch)*zoom, target[1]+Math.sin(pitch)*zoom, target[2]+Math.cos(yaw)*Math.cos(pitch)*zoom];
        const vp = mat4_multiply(mat4_perspective(1.0, canvas.width/canvas.height, 0.1, 100), mat4_lookAt(eye, target, [0,1,0]));
        device.queue.writeBuffer(camBuf, 0, vp);

        // Render
        const enc = device.createCommandEncoder();
        const pass = enc.beginRenderPass({
          colorAttachments: [{ view: context.getCurrentTexture().createView(), clearValue: [0.05, 0.05, 0.05, 1], loadOp: "clear", storeOp: "store" }],
          depthStencilAttachment: { view: dT.createView(), depthClearValue: 1, depthLoadOp: "clear", depthStoreOp: "store" }
        });
        pass.setPipeline(pipeline); pass.setBindGroup(0, camBG);
        pass.setVertexBuffer(0, pB); pass.setVertexBuffer(1, nB); pass.setVertexBuffer(2, instB);
        pass.setIndexBuffer(iB, "uint32"); pass.drawIndexed(sData.ind.length, spheres.length);
        pass.end(); device.queue.submit([enc.finish()]);
        requestAnimationFrame(frame);
      }

      resetSimulation();
      frame();
    }
    init();
  </script>
</body>
</html>
