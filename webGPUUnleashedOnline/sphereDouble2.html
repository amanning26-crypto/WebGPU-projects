<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGPU Raymarched Spheres v2</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    <script type="module">
        const shaderSource = `
            struct Uniforms {
                time : f32,
                resolution : vec2<f32>,
            };
            @binding(0) @group(0) var<uniform> u : Uniforms;

            struct VertexOutput {
                @builtin(position) pos : vec4<f32>,
                @location(0) uv : vec2<f32>,
            };

            @vertex
            fn vs_main(@builtin(vertex_index) idx : u32) -> VertexOutput {
                var pos = array<vec2<f32>, 3>(
                    vec2<f32>(-1.0, -1.0), vec2<f32>(3.0, -1.0), vec2<f32>(-1.0, 3.0)
                );
                var out : VertexOutput;
                out.pos = vec4<f32>(pos[idx], 0.0, 1.0);
                out.uv = pos[idx];
                return out;
            }

            fn sdfSphere(p : vec3<f32>, s : f32) -> f32 {
                return length(p) - s;
            }

            @fragment
            fn fs_main(@location(0) uv : vec2<f32>) -> @location(0) vec4<f32> {
                let aspect = u.resolution.x / u.resolution.y;
                let p = vec2<f32>(uv.x * aspect, uv.y);
                
                var rayOri = vec3<f32>(0.0, 0.0, 3.0);
                var rayDir = normalize(vec3<f32>(p, -1.5));

                var t = 0.0;
                var color = vec3<f32>(0.05); // Background
                
                for(var i = 0; i < 64; i++) {
                    let pos = rayOri + rayDir * t;
                    
                    // Sphere 1 (Blue)
                    let s1Pos = pos - vec3<f32>(-1.2, sin(u.time) * 0.5, 0.0);
                    let d1 = sdfSphere(s1Pos, 0.7);
                    
                    // Sphere 2 (Gold)
                    let s2Pos = pos - vec3<f32>(1.2, cos(u.time) * 0.5, 0.0);
                    let d2 = sdfSphere(s2Pos, 0.7);
                    
                    let d = min(d1, d2);

                    if (d < 0.001) {
                        let normal = select(normalize(s2Pos), normalize(s1Pos), d1 < d2);
                        let objCol = select(vec3<f32>(1.0, 0.8, 0.1), vec3<f32>(0.0, 0.5, 1.0), d1 < d2);
                        
                        let lightDir = normalize(vec3<f32>(5.0, 5.0, 5.0));
                        let viewDir = normalize(rayOri - pos);
                        let halfDir = normalize(lightDir + viewDir);
                        
                        let diff = max(dot(normal, lightDir), 0.1);
                        let spec = pow(max(dot(normal, halfDir), 0.0), 50.0);
                        
                        color = objCol * diff + vec3<f32>(spec);
                        break;
                    }
                    t += d;
                    if (t > 10.0) { break; }
                }

                return vec4<f32>(color, 1.0);
            }
        `;

        async function init() {
            const canvas = document.getElementById('gpuCanvas');
            const adapter = await navigator.gpu?.requestAdapter();
            const device = await adapter?.requestDevice();
            if (!device) return alert("WebGPU not supported. Check chrome://flags/#enable-unsafe-webgpu");

            const context = canvas.getContext('webgpu');
            const format = navigator.gpu.getPreferredCanvasFormat();
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            context.configure({ device, format });

            const module = device.createShaderModule({ code: shaderSource });
            const pipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: { module, entryPoint: 'vs_main' },
                fragment: { module, entryPoint: 'fs_main', targets: [{ format }] },
                primitive: { topology: 'triangle-list' }
            });

            const uBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            const bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: uBuf } }]
            });

            function frame(time) {
                const stats = new Float32Array([time * 0.001, canvas.width, canvas.height, 0]);
                device.queue.writeBuffer(uBuf, 0, stats);

                const encoder = device.createCommandEncoder();
                const pass = encoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: [0, 0, 0, 1], loadOp: 'clear', storeOp: 'store'
                    }]
                });
                pass.setPipeline(pipeline);
                pass.setBindGroup(0, bindGroup);
                pass.draw(3);
                pass.end();
                device.queue.submit([encoder.finish()]);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }
        init();
    </script>
</body>
</html>
