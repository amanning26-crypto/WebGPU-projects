<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebGPU Spheres</title>
<style>
body { margin:0; background:#777; }
canvas { width:100vw; height:100vh; display:block; }
</style>
</head>

<body>
<canvas id="c"></canvas>

<script type="module">

const canvas = document.querySelector("#c");

async function init(){

if(!navigator.gpu){
 document.body.innerHTML="WebGPU not supported";
 return;
}

const adapter = await navigator.gpu.requestAdapter();
const device = await adapter.requestDevice();

const context = canvas.getContext("webgpu");

const format = navigator.gpu.getPreferredCanvasFormat();

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

context.configure({
 device,
 format,
 alphaMode:"opaque"
});

const depthTexture = device.createTexture({
 size:[canvas.width,canvas.height],
 format:"depth24plus",
 usage:GPUTextureUsage.RENDER_ATTACHMENT
});

function createSphere(r, lat, lon){

let p=[],n=[],i=[];

for(let y=0;y<=lat;y++){
 let v=y/lat;
 let th=v*Math.PI;

 for(let x=0;x<=lon;x++){
 let u=x/lon;
 let ph=u*Math.PI*2;

 let sx=Math.sin(th)*Math.cos(ph);
 let sy=Math.cos(th);
 let sz=Math.sin(th)*Math.sin(ph);

 p.push(r*sx,r*sy,r*sz);
 n.push(sx,sy,sz);
 }
}

for(let y=0;y<lat;y++){
 for(let x=0;x<lon;x++){

 let a=y*(lon+1)+x;
 let b=a+lon+1;

 i.push(a,b,a+1);
 i.push(b,b+1,a+1);
 }
}

return{
pos:new Float32Array(p),
norm:new Float32Array(n),
ind:new Uint32Array(i)
};
}

const sphere=createSphere(0.7,32,32);

function buffer(data,usage){
 const b=device.createBuffer({
  size:data.byteLength,
  usage,
  mappedAtCreation:true
 });
 new data.constructor(b.getMappedRange()).set(data);
 b.unmap();
 return b;
}

const posBuf=buffer(sphere.pos,GPUBufferUsage.VERTEX);
const normBuf=buffer(sphere.norm,GPUBufferUsage.VERTEX);
const indBuf=buffer(sphere.ind,GPUBufferUsage.INDEX);

const shader=device.createShaderModule({
code:`

struct VSOut{
 @builtin(position) pos:vec4f,
 @location(0) normal:vec3f,
 @location(1) inst: f32
};

@vertex
fn vs(
 @location(0) position:vec3f,
 @location(1) normal:vec3f,
 @builtin(instance_index) inst:u32
)->VSOut{

 var out:VSOut;

 var offset:vec3f;

 if(inst==0u){
  offset=vec3f(-1.2,0.0,-4.0);
 }else{
  offset=vec3f(1.2,0.0,-4.0);
 }

 let p=position+offset;

 let aspect=1.777;
 let f=1.0/tan(1.0/2.0);

 let proj=mat4x4<f32>(
  vec4f(f/aspect,0,0,0),
  vec4f(0,f,0,0),
  vec4f(0,0,-1.01,-1),
  vec4f(0,0,-0.101,0)
 );

 out.pos=proj*vec4f(p,1);

 out.normal=normal;
 out.inst=f32(inst);

 return out;
}

@fragment
fn fs(in:VSOut)->@location(0) vec4f{

 let light=normalize(vec3f(1,1,1));

 let d=max(dot(in.normal,light),0.0);

 var base:vec3f;

 if(in.inst<0.5){
  base=vec3f(0.2,0.6,1.0);
 }else{
  base=vec3f(1.0,0.4,0.3);
 }

 return vec4f(base*d+0.1,1);
}

`
});

const pipeline=device.createRenderPipeline({

layout:"auto",

vertex:{
 module:shader,
 entryPoint:"vs",
 buffers:[
 {arrayStride:12,attributes:[{shaderLocation:0,offset:0,format:"float32x3"}]},
 {arrayStride:12,attributes:[{shaderLocation:1,offset:0,format:"float32x3"}]}
 ]
},

fragment:{
 module:shader,
 entryPoint:"fs",
 targets:[{format}]
},

primitive:{
 topology:"triangle-list",
 cullMode:"back"
},

depthStencil:{
 format:"depth24plus",
 depthWriteEnabled:true,
 depthCompare:"less"
}

});

function frame(){

const encoder=device.createCommandEncoder();

const pass=encoder.beginRenderPass({

colorAttachments:[{
 view:context.getCurrentTexture().createView(),
 clearValue:{r:0.6,g:0.6,b:0.6,a:1},
 loadOp:"clear",
 storeOp:"store"
}],

depthStencilAttachment:{
 view:depthTexture.createView(),
 depthClearValue:1,
 depthLoadOp:"clear",
 depthStoreOp:"store"
}

});

pass.setPipeline(pipeline);

pass.setVertexBuffer(0,posBuf);
pass.setVertexBuffer(1,normBuf);
pass.setIndexBuffer(indBuf,"uint32");

pass.drawIndexed(sphere.ind.length,2);

pass.end();

device.queue.submit([encoder.finish()]);

requestAnimationFrame(frame);
}

frame();
}

init();

</script>
</body>
</html>
