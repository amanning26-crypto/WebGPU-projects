<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Compact WebGPU Bacteria Simulation</title>
<style>
  body { margin:0; background:#111; color:#eee; font-family:sans-serif; }
  #ui { position:fixed; top:10px; left:10px; background:#222; padding:10px; border-radius:6px; }
  label { display:block; margin-bottom:6px; }
</style>
</head>
<body>
<div id="ui">
  <label>Bacteria Count: <span id="countLabel">50</span></label>
  <input id="countSlider" type="range" min="1" max="100" value="50">
  <button id="resetBtn">Reset</button>
</div>
<canvas id="gfx"></canvas>

<script type="module">
/* -----------------------------------------------------------
   SECTION 1: Basic Math Helpers
----------------------------------------------------------- */
function mat4Perspective(fov, aspect, near, far) {
  const f = 1.0 / Math.tan(fov/2), nf = 1/(near - far);
  return new Float32Array([
    f/aspect,0,0,0,
    0,f,0,0,
    0,0,(far+near)*nf,-1,
    0,0,(2*far*near)*nf,0
  ]);
}
function mat4LookAt(eye,center,up) {
  const [ex,ey,ez]=eye,[cx,cy,cz]=center,[ux,uy,uz]=up;
  let zx=ex-cx, zy=ey-cy, zz=ez-cz;
  const zl=1/Math.hypot(zx,zy,zz); zx*=zl; zy*=zl; zz*=zl;
  let xx=uy*zz-uz*zy, xy=uz*zx-ux*zz, xz=ux*zy-uy*zx;
  const xl=1/Math.hypot(xx,xy,xz); xx*=xl; xy*=xl; xz*=xl;
  const yx=zy*xz-zz*xy, yy=zz*xx-zx*xz, yz=zx*xy-zy*xx;
  return new Float32Array([
    xx,yx,zx,0,
    xy,yy,zy,0,
    xz,yz,zz,0,
    -(xx*ex+xy*ey+xz*ez),
    -(yx*ex+yy*ey+yz*ez),
    -(zx*ex+zy*ey+zz*ez),
    1
  ]);
}

/* -----------------------------------------------------------
   SECTION 2: Capsule Geometry (Low-Medium Poly)
----------------------------------------------------------- */
function createCapsule(radius=0.05, halfLen=0.1, seg=8) {
  const verts=[];
  for(let i=0;i<=seg;i++){
    const v=i/seg, y=-halfLen + 2*halfLen*v;
    const r=radius;
    for(let j=0;j<=seg;j++){
      const u=j/seg, th=u*Math.PI*2;
      verts.push(r*Math.cos(th), y, r*Math.sin(th));
    }
  }
  return new Float32Array(verts);
}

/* -----------------------------------------------------------
   SECTION 3: WebGPU Setup
----------------------------------------------------------- */
const canvas=document.getElementById("gfx");
const adapter=await navigator.gpu.requestAdapter();
const device=await adapter.requestDevice();
const ctx=canvas.getContext("webgpu");
const format=navigator.gpu.getPreferredCanvasFormat();
ctx.configure({device,format,alphaMode:"opaque"});

function resize() {
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* -----------------------------------------------------------
   SECTION 4: Shaders
----------------------------------------------------------- */
const shader=/*wgsl*/`
struct Camera {
  viewProj: mat4x4<f32>;
}

struct Instance {
  pos: vec3<f32>;
  health: f32;
}

struct VSOut {
  @builtin(position) pos: vec4<f32>;
  @location(0) health: f32;
}

@group(0) @binding(0) var<uniform> cam: Camera;
@group(0) @binding(1) var<storage, read> inst: array<Instance>;

@vertex
fn vsMain(@location(0) pos: vec3<f32>, @builtin(instance_index) i: u32) -> VSOut {
  let p = inst[i].pos;
  let world = vec4<f32>(pos + p, 1.0);

  var out: VSOut;
  out.pos = cam.viewProj * world;
  out.health = inst[i].health;
  return out;
}

@fragment
fn fsMain(in: VSOut) -> @location(0) vec4<f32> {
  let h = in.health;
  return vec4<f32>(0.2 + h * 0.8, 0.4 * h, 0.1, 1.0);
}

`;

/* -----------------------------------------------------------
   SECTION 5: Pipeline and Buffers
----------------------------------------------------------- */
const module=device.createShaderModule({code:shader});
const verts=createCapsule();
const vbuf=device.createBuffer({
  size:verts.byteLength, usage:GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST
});
device.queue.writeBuffer(vbuf,0,verts);

const MAX=100;
let instances=new Float32Array(MAX*4); // pos.xyz, health
const instBuf=device.createBuffer({
  size:instances.byteLength,
  usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST
});

const camBuf=device.createBuffer({
  size:64, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST
});

const bind=device.createBindGroup({
  layout:device.createBindGroupLayout({
    entries:[
      {binding:0,visibility:GPUShaderStage.VERTEX,buffer:{type:"uniform"}},
      {binding:1,visibility:GPUShaderStage.VERTEX,buffer:{type:"read-only-storage"}}
    ]
  }),
  entries:[
    {binding:0,resource:{buffer:camBuf}},
    {binding:1,resource:{buffer:instBuf}}
  ]
});

const pipeline=device.createRenderPipeline({
  layout:device.createPipelineLayout({bindGroupLayouts:[bind.getBindGroupLayout()]}),
  vertex:{
    module,entryPoint:"vsMain",
    buffers:[{arrayStride:12,attributes:[{shaderLocation:0,offset:0,format:"float32x3"}]}]
  },
  fragment:{module,entryPoint:"fsMain",targets:[{format}]},
  primitive:{topology:"triangle-strip"},
  depthStencil:{format:"depth24plus",depthWriteEnabled:true,depthCompare:"less"}
});

const depthTex=()=>device.createTexture({
  size:[canvas.width,canvas.height],
  format:"depth24plus",
  usage:GPUTextureUsage.RENDER_ATTACHMENT
});

/* -----------------------------------------------------------
   SECTION 6: Simulation State
----------------------------------------------------------- */
let count=50;
function reset() {
  for(let i=0;i<count;i++){
    const idx=i*4;
    instances[idx+0]=(Math.random()-0.5)*1.5;
    instances[idx+1]=(Math.random()-0.5)*1.5;
    instances[idx+2]=(Math.random()-0.5)*1.5;
    instances[idx+3]=1.0;
  }
}
reset();

/* -----------------------------------------------------------
   SECTION 7: Camera Control (Trackball)
----------------------------------------------------------- */
let yaw=0.6, pitch=0.6, dist=3.0;
let dragging=false, lx=0, ly=0;

canvas.addEventListener("mousedown",e=>{dragging=true; lx=e.clientX; ly=e.clientY;});
addEventListener("mouseup",()=>dragging=false);
addEventListener("mousemove",e=>{
  if(!dragging)return;
  const dx=e.clientX-lx, dy=e.clientY-ly;
  lx=e.clientX; ly=e.clientY;
  yaw+=dx*0.005;
  pitch+=dy*0.005;
  pitch=Math.max(-1.5,Math.min(1.5,pitch));
});
canvas.addEventListener("wheel",e=>{
  dist*=1+e.deltaY*0.001;
  dist=Math.max(1.0,Math.min(10.0,dist));
});

/* -----------------------------------------------------------
   SECTION 8: UI
----------------------------------------------------------- */
const slider=document.getElementById("countSlider");
const label=document.getElementById("countLabel");
slider.oninput=()=>{
  count=parseInt(slider.value);
  label.textContent=count;
  reset();
};
document.getElementById("resetBtn").onclick=reset;

/* -----------------------------------------------------------
   SECTION 9: Main Loop
----------------------------------------------------------- */
let depth=depthTex();
function frame() {
  if(depth.width!==canvas.width||depth.height!==canvas.height) depth=depthTex();

  for(let i=0;i<count;i++){
    const idx=i*4;
    instances[idx+0]+= (Math.random()-0.5)*0.01;
    instances[idx+1]+= (Math.random()-0.5)*0.01;
    instances[idx+2]+= (Math.random()-0.5)*0.01;
    instances[idx+3]-=0.001;
    if(instances[idx+3]<=0){
      instances[idx+0]=(Math.random()-0.5)*1.5;
      instances[idx+1]=(Math.random()-0.5)*1.5;
      instances[idx+2]=(Math.random()-0.5)*1.5;
      instances[idx+3]=1.0;
    }
  }
  device.queue.writeBuffer(instBuf,0,instances);

  const eye=[
    Math.cos(yaw)*Math.cos(pitch)*dist,
    Math.sin(pitch)*dist,
    Math.sin(yaw)*Math.cos(pitch)*dist
  ];
  const vp=mat4Perspective(1.0,canvas.width/canvas.height,0.1,20.0);
  const view=mat4LookAt(eye,[0,0,0],[0,1,0]);
  const vpv=new Float32Array(16);
  for(let i=0;i<4;i++)for(let j=0;j<4;j++)
    vpv[i*4+j]=vp[i*4+0]*view[j+0]+vp[i*4+1]*view[j+4]+vp[i*4+2]*view[j+8]+vp[i*4+3]*view[j+12];
  device.queue.writeBuffer(camBuf,0,vpv);

  const encoder=device.createCommandEncoder();
  const pass=encoder.beginRenderPass({
    colorAttachments:[{
      view:ctx.getCurrentTexture().createView(),
      loadOp:"clear",storeOp:"store",
      clearValue:{r:0.05,g:0.05,b:0.05,a:1}
    }],
    depthStencilAttachment:{
      view:depth.createView(),
      depthLoadOp:"clear",depthStoreOp:"store",
      depthClearValue:1.0
    }
  });
  pass.setPipeline(pipeline);
  pass.setBindGroup(0,bind);
  pass.setVertexBuffer(0,vbuf);
  pass.draw(verts.length/3,count);
  pass.end();
  device.queue.submit([encoder.finish()]);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
