<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU · Bacteria in wireframe fluid</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: #eee; background: rgba(0,0,0,0.6);
            padding: 15px 25px; border-radius: 8px; backdrop-filter: blur(4px); pointer-events: none;
            border-left: 4px solid #4caf50; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,30,0.85); backdrop-filter: blur(8px);
            color: white; padding: 18px 30px; border-radius: 60px;
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
            border: 1px solid #445566; box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            z-index: 20; font-size: 15px; letter-spacing: 0.5px;
        }
        .slider-container { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 160px; }
        .slider-container label { color: #aaccff; font-weight: 500; font-size: 0.9rem; }
        .slider-container input { width: 100%; cursor: pointer; accent-color: #4caf50; }
        .slider-container span { color: #ffd966; font-weight: 600; font-size: 1.1rem; }
        .value-badge { background: #2a3a4a; padding: 2px 12px; border-radius: 40px; }
        a { color: #aaa; text-decoration: none; }
        footer { position: absolute; bottom: 10px; right: 20px; color: #6b7f8f; font-size: 12px; z-index: 15; }
    </style>
</head>
<body>
    <div id="info">
        <h2 style="margin:0 0 8px; color:#b3ffaa;">🦠 BACTERIA ZONE · wireframe fluid</h2>
        <p style="margin:0; opacity:0.8;">Pill‑shaped with flagella · food = glowing particles · health per food</p>
    </div>
    <div id="controls">
        <div class="slider-container">
            <label>⏱️ TIME SPEED <span style="color:#ccc;">(0–2x)</span></label>
            <input type="range" id="speedSlider" min="0" max="2" step="0.05" value="1.0">
            <span id="speedVal" class="value-badge">1.00x</span>
        </div>
        <div class="slider-container">
            <label>🦠 BACTERIA COUNT</label>
            <input type="range" id="countSlider" min="5" max="60" step="1" value="28">
            <span id="countVal" class="value-badge">28</span>
        </div>
        <div class="slider-container">
            <label>🍎 FOOD SUPPLY</label>
            <input type="range" id="foodSlider" min="0" max="80" step="1" value="45">
            <span id="foodVal" class="value-badge">45</span>
        </div>
    </div>
    <footer>🧬 WebGPU · wireframe · drag to rotate</footer>

    <!-- Import Three.js and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup WebGPU renderer (fallback to WebGL if not supported, but we aim for WebGPU) ---
        const container = document.createElement('div');
        document.body.appendChild(container);

        let camera, scene, renderer, css2DRenderer, controls;
        let foodParticles, foodPositions, foodHealthAttr; // food health: 1 = active, 0 = eaten
        let bacteriaMeshes = [];
        let clock = new THREE.Clock();

        // UI elements
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const countSlider = document.getElementById('countSlider');
        const countVal = document.getElementById('countVal');
        const foodSlider = document.getElementById('foodSlider');
        const foodVal = document.getElementById('foodVal');

        // Parameters
        let timeScale = 1.0;
        let targetBacteriaCount = 28;
        let targetFoodCount = 45;
        let foodArrayLength = 0; // actual length of buffer

        // Bacteria class to store state
        class Bacterium {
            constructor() {
                this.mesh = null;
                this.velocity = new THREE.Vector3();
                this.health = 100;             // max 200, dies if 0
                this.flagellaPhase = Math.random() * 100;
            }
        }

        // --- Initialization ---
        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b1420); // deep space-like

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 15, 30);
            camera.lookAt(0, 0, 0);

            // Try WebGPU first, fallback to WebGL
            try {
                renderer = new THREE.WebGPURenderer({ antialias: true, forceWebGL: false });
                await renderer.init();
                console.log('WebGPU activated');
            } catch (e) {
                console.warn('WebGPU not available, falling back to WebGL', e);
                renderer = new THREE.WebGLRenderer({ antialias: true });
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x0b1420);
            container.appendChild(renderer.domElement);

            // CSS2DRenderer for health labels
            css2DRenderer = new CSS2DRenderer();
            css2DRenderer.setSize(window.innerWidth, window.innerHeight);
            css2DRenderer.domElement.style.position = 'absolute';
            css2DRenderer.domElement.style.top = '0px';
            css2DRenderer.domElement.style.left = '0px';
            css2DRenderer.domElement.style.pointerEvents = 'none'; // allow clicks to pass through
            container.appendChild(css2DRenderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.enableZoom = true;
            controls.maxPolarAngle = Math.PI / 2; // restrict below

            // Lighting for 3D (wireframe also catches light)
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x446688, 1);
            backLight.position.set(-5, 0, -5);
            scene.add(backLight);

            // --- Wireframe fluid space: a faint wire cube + random flowing curves (particles on lines) ---
            const gridHelper = new THREE.GridHelper(40, 20, 0x3a6ea5, 0x2a4a6a);
            gridHelper.position.y = -2;
            scene.add(gridHelper);
            
            // Large wire cube to define fluid volume
            const wireCubeGeo = new THREE.BoxGeometry(28, 18, 28);
            const wireCubeMat = new THREE.MeshBasicMaterial({ color: 0x2f6f9f, wireframe: true, transparent: true, opacity: 0.15 });
            const wireCube = new THREE.Mesh(wireCubeGeo, wireCubeMat);
            wireCube.position.set(0, 3, 0);
            scene.add(wireCube);

            // Fluid flow lines (static but visual)
            const flowPoints = [];
            for (let i = 0; i < 40; i++) {
                const t = i / 39;
                const angle = t * Math.PI * 4;
                const radius = 12 + Math.sin(t * 8) * 3;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle * 1.3) * radius * 0.8;
                const y = Math.sin(angle * 2) * 5 + 3;
                flowPoints.push(new THREE.Vector3(x, y, z));
            }
            const flowCurve = new THREE.CatmullRomCurve3(flowPoints);
            const flowLineGeo = new THREE.BufferGeometry().setFromPoints(flowCurve.getPoints(100));
            const flowLineMat = new THREE.LineBasicMaterial({ color: 0x3377aa, opacity: 0.2, transparent: true });
            const flowLine = new THREE.Line(flowLineGeo, flowLineMat);
            scene.add(flowLine);

            // extra floating wireframe spheres as "fluid eddies"
            const eddyGeo = new THREE.SphereGeometry(3, 8, 6);
            const eddyMat = new THREE.MeshBasicMaterial({ wireframe: true, color: 0x3f7faf, transparent: true, opacity: 0.1 });
            const eddy = new THREE.Mesh(eddyGeo, eddyMat);
            eddy.position.set(6, 5, 4);
            scene.add(eddy);
            const eddy2 = eddy.clone();
            eddy2.position.set(-5, 2, -6);
            eddy2.scale.set(1.5, 1.2, 1);
            scene.add(eddy2);

            // --- FOOD SYSTEM: particle cloud with health attribute (1 = alive) ---
            function initFood(count) {
                if (foodParticles) scene.remove(foodParticles);
                
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const health = new Float32Array(count); // 1 = available, 0 = consumed
                const colors = new Float32Array(count * 3);
                
                for (let i = 0; i < count; i++) {
                    const x = (Math.random() - 0.5) * 24;
                    const y = (Math.random() - 0.5) * 14 + 4; // keep above ground
                    const z = (Math.random() - 0.5) * 24;
                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;
                    
                    health[i] = 1.0; // active
                    
                    // color: yellowish, slightly varied
                    colors[i*3] = 1.0;
                    colors[i*3+1] = 0.8 + Math.random()*0.2;
                    colors[i*3+2] = 0.2 + Math.random()*0.3;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('health', new THREE.BufferAttribute(health, 1)); // scalar attribute
                
                const material = new THREE.PointsMaterial({ 
                    size: 0.8, 
                    vertexColors: true, 
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                
                foodParticles = new THREE.Points(geometry, material);
                scene.add(foodParticles);
                
                foodPositions = positions;
                foodHealthAttr = health;
                foodArrayLength = count;
                targetFoodCount = count;
            }
            initFood(targetFoodCount);

            // --- Bacteria creation: pill capsule + flagella (wireframe) ---
            function createBacteriumMesh() {
                const group = new THREE.Group();

                // Capsule (cylinder + two hemispheres)
                const radius = 0.9;
                const height = 2.2;
                
                // central cylinder
                const cylGeo = new THREE.CylinderGeometry(radius, radius, height, 8, 1);
                const cylMat = new THREE.MeshPhongMaterial({ color: 0x88cc88, wireframe: true, emissive: 0x113311 });
                const cylinder = new THREE.Mesh(cylGeo, cylMat);
                cylinder.rotation.x = Math.PI / 2; // align with Z?
                cylinder.rotation.z = Math.PI / 2; // make capsule along Y? easier: cylinder along Y then rotate later
                // simpler: capsule oriented along Y, we rotate group as needed.
                cylinder.rotation.x = 0; 
                cylinder.rotation.z = 0; 
                cylinder.position.y = 0;
                group.add(cylinder);
                
                // hemispheres (two spheres)
                const sphereGeo = new THREE.SphereGeometry(radius, 6, 4);
                const sphereMat = new THREE.MeshPhongMaterial({ color: 0x88dd88, wireframe: true, emissive: 0x112211 });
                const topCap = new THREE.Mesh(sphereGeo, sphereMat);
                topCap.position.y = height/2;
                group.add(topCap);
                
                const bottomCap = new THREE.Mesh(sphereGeo, sphereMat);
                bottomCap.position.y = -height/2;
                group.add(bottomCap);
                
                // Flagella: a few wavy lines
                const flagMat = new THREE.LineBasicMaterial({ color: 0xaaffaa });
                for (let i = 0; i < 3; i++) {
                    const points = [];
                    const startY = -height/2 - 0.2;
                    const offsetAngle = (i / 3) * Math.PI * 2;
                    for (let j = 0; j <= 8; j++) {
                        const t = j / 8;
                        const y = startY - t * 3.5;
                        const spiralX = Math.sin(t * 12 + offsetAngle) * 0.7 * (1 - t*0.5);
                        const spiralZ = Math.cos(t * 12 + offsetAngle) * 0.7 * (1 - t*0.5);
                        points.push(new THREE.Vector3(spiralX, y, spiralZ));
                    }
                    const geo = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geo, flagMat);
                    group.add(line);
                }
                
                return group;
            }

            function spawnBacteria(count) {
                // remove old
                bacteriaMeshes.forEach(b => {
                    scene.remove(b.mesh);
                    if (b.label) scene.remove(b.label);
                });
                bacteriaMeshes = [];
                
                for (let i = 0; i < count; i++) {
                    const b = new Bacterium();
                    const mesh = createBacteriumMesh();
                    
                    // random position inside volume
                    mesh.position.x = (Math.random() - 0.5) * 22;
                    mesh.position.y = Math.random() * 12 + 1;
                    mesh.position.z = (Math.random() - 0.5) * 22;
                    
                    // random rotation
                    mesh.rotation.y = Math.random() * Math.PI * 2;
                    mesh.rotation.x = (Math.random() - 0.5) * 0.5;
                    
                    mesh.scale.set(0.8 + Math.random()*0.4, 0.8+Math.random()*0.4, 0.8+Math.random()*0.4);
                    
                    scene.add(mesh);
                    b.mesh = mesh;
                    
                    // Health label (CSS2D)
                    const div = document.createElement('div');
                    div.textContent = '💚';
                    div.style.color = '#aaffaa';
                    div.style.fontSize = '16px';
                    div.style.fontWeight = 'bold';
                    div.style.textShadow = '0 0 8px green';
                    div.style.background = 'rgba(0,20,0,0.5)';
                    div.style.borderRadius = '12px';
                    div.style.padding = '2px 6px';
                    div.style.border = '1px solid #88ff88';
                    const label = new CSS2DObject(div);
                    label.position.set(0, 2.2, 0);
                    mesh.add(label);
                    b.label = label;
                    
                    // random velocity
                    b.velocity.set((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.15, (Math.random()-0.5)*0.2);
                    
                    bacteriaMeshes.push(b);
                }
            }
            spawnBacteria(targetBacteriaCount);

            // --- Event listeners for UI ---
            speedSlider.addEventListener('input', (e) => {
                timeScale = parseFloat(e.target.value);
                speedVal.textContent = timeScale.toFixed(2) + 'x';
            });
            countSlider.addEventListener('input', (e) => {
                targetBacteriaCount = parseInt(e.target.value);
                countVal.textContent = targetBacteriaCount;
                // respawn bacteria with new count (preserve health approx?)
                spawnBacteria(targetBacteriaCount);
            });
            foodSlider.addEventListener('input', (e) => {
                targetFoodCount = parseInt(e.target.value);
                foodVal.textContent = targetFoodCount;
                // adjust food array size: re-init food
                initFood(targetFoodCount);
            });

            window.addEventListener('resize', onWindowResize, false);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta() * timeScale;
            if (delta > 0.1) return; // skip large jumps
            
            // Update bacteria: move, seek food, health, flagella wiggle
            if (bacteriaMeshes.length > 0 && foodParticles) {
                const foodPos = foodParticles.geometry.attributes.position.array;
                const healthAttr = foodParticles.geometry.attributes.health.array;
                
                for (let b of bacteriaMeshes) {
                    // skip dead? we don't remove yet for simplicity; health >0 always
                    if (b.health <= 0) {
                        b.mesh.visible = false;
                        continue;
                    } else {
                        b.mesh.visible = true;
                    }
                    
                    // move based on velocity + slight random
                    b.mesh.position.x += b.velocity.x * delta * 2.5;
                    b.mesh.position.y += b.velocity.y * delta * 2.5;
                    b.mesh.position.z += b.velocity.z * delta * 2.5;
                    
                    // boundaries (soft bounce)
                    const limit = 13;
                    if (Math.abs(b.mesh.position.x) > limit) b.velocity.x *= -0.8;
                    if (b.mesh.position.y > 15) b.velocity.y *= -0.8;
                    if (b.mesh.position.y < 1) b.velocity.y *= -0.8;
                    if (Math.abs(b.mesh.position.z) > limit) b.velocity.z *= -0.8;
                    
                    b.mesh.position.x = Math.max(-limit, Math.min(limit, b.mesh.position.x));
                    b.mesh.position.y = Math.max(1, Math.min(15, b.mesh.position.y));
                    b.mesh.position.z = Math.max(-limit, Math.min(limit, b.mesh.position.z));
                    
                    // rotate to face movement direction (approx)
                    if (b.velocity.lengthSq() > 0.001) {
                        const dir = b.velocity.clone().normalize();
                        const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
                        b.mesh.quaternion.slerp(quat, 0.1);
                    }
                    
                    // flagella wiggle: rotate sub-elements? just animate whole mesh little wave
                    b.flagellaPhase += delta * 5;
                    b.mesh.rotation.z += Math.sin(b.flagellaPhase) * 0.01;
                    
                    // food seeking: check distance to all food particles
                    let ate = false;
                    for (let i = 0; i < foodArrayLength; i++) {
                        if (healthAttr[i] < 0.5) continue; // already eaten
                        
                        const fx = foodPos[i*3];
                        const fy = foodPos[i*3+1];
                        const fz = foodPos[i*3+2];
                        
                        const dx = fx - b.mesh.position.x;
                        const dy = fy - b.mesh.position.y;
                        const dz = fz - b.mesh.position.z;
                        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                        
                        if (dist < 3.0) {
                            // eat!
                            healthAttr[i] = 0.0; // consumed
                            b.health = Math.min(200, b.health + 35);
                            ate = true;
                            
                            // optional: respawn food at new location after a while? we move it far away and set health 1 later?
                            // simpler: relocate the food to a random spot and set health 1 again -> continuous food supply.
                            foodPos[i*3] = (Math.random() - 0.5) * 24;
                            foodPos[i*3+1] = (Math.random() - 0.5) * 14 + 4;
                            foodPos[i*3+2] = (Math.random() - 0.5) * 24;
                            healthAttr[i] = 1.0; // reactivate
                        }
                    }
                    
                    // slight health decay over time
                    b.health = Math.max(1, b.health - delta * 1.5);
                    
                    // Update label
                    if (b.label) {
                        b.label.element.textContent = '💚'.repeat(Math.ceil(b.health/40) + 1);
                        b.label.element.style.color = b.health > 120 ? '#b3ffaa' : '#ffcc88';
                    }
                    
                    // random velocity change (fluid)
                    b.velocity.x += (Math.random() - 0.5) * delta * 1.5;
                    b.velocity.y += (Math.random() - 0.5) * delta * 1.2;
                    b.velocity.z += (Math.random() - 0.5) * delta * 1.5;
                    b.velocity.clampLength(0, 0.5);
                }
                
                // update food particle geometry to reflect relocated positions
                foodParticles.geometry.attributes.position.needsUpdate = true;
                // also health attribute not needed for render, but we keep for logic
            }
            
            controls.update();
            
            // Render with WebGPU (or WebGL) and CSS2DRenderer
            renderer.render(scene, camera);
            css2DRenderer.render(scene, camera);
        }

        init().catch(console.error);
    </script>
</body>
</html>
