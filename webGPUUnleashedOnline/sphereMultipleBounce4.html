<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebGPU: Physics Lab Final</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 220px;
            border: 1px solid #444;
            z-index: 10;
        }

        .row {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            margin-bottom: 5px;
            color: #888;
            text-transform: uppercase;
        }

        input[type=range] {
            cursor: pointer;
            accent-color: #0f0;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
        }

        .val {
            float: right;
            color: #0f0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="row"><label>Spheres <span id="cntV" class="val">40</span></label><input type="range" id="cntI"
                min="5" max="100" value="40"></div>
        <div class="row"><label>Speed <span id="velV" class="val">1.0</span></label><input type="range" id="velI"
                min="0" max="300" value="100"></div>
        <div class="row"><label>Friction <span id="fricV" class="val">0%</span></label><input type="range" id="fricI"
                min="950" max="1050" value="1000"></div>
        <button id="resetBtn">RESTART</button>
    </div>
    <canvas id="c"></canvas>

    <script type="module">
        const canvas = document.querySelector("#c");

        const vec3 = {
            sub: (a, b) => [a[0] - b[0], a[1] - b[1], a[2] - b[2]],
            add: (a, b) => [a[0] + b[0], a[1] + b[1], a[2] + b[2]],
            mul: (a, s) => [a[0] * s, a[1] * s, a[2] * s],
            dot: (a, b) => a[0] * b[0] + a[1] * b[1] + a[2] * b[2],
            normalize: (v) => { let l = Math.sqrt(v[0] ** 2 + v[1] ** 2 + v[2] ** 2); return l > 0 ? [v[0] / l, v[1] / l, v[2] / l] : [0, 0, 0]; },
            cross: (a, b) => [a[1] * b[2] - a[2] * b[1], a[2] * b[0] - a[0] * b[2], a[0] * b[1] - a[1] * b[0]]
        };

        function mat4_multiply(a, b) {
            let out = new Float32Array(16);
            for (let c = 0; c < 4; c++) for (let r = 0; r < 4; r++)
                out[c * 4 + r] = a[0 * 4 + r] * b[c * 4 + 0] + a[1 * 4 + r] * b[c * 4 + 1] + a[2 * 4 + r] * b[c * 4 + 2] + a[3 * 4 + r] * b[c * 4 + 3];
            return out;
        }

        function mat4_lookAt(eye, target, up) {
            let z = vec3.normalize(vec3.sub(eye, target)), x = vec3.normalize(vec3.cross(up, z)), y = vec3.cross(z, x);
            return new Float32Array([x[0], y[0], z[0], 0, x[1], y[1], z[1], 0, x[2], y[2], z[2], 0, -vec3.dot(x, eye), -vec3.dot(y, eye), -vec3.dot(z, eye), 1]);
        }

        function mat4_perspective(fov, aspect, near, far) {
            let f = 1.0 / Math.tan(fov / 2), nf = 1 / (near - far);
            return new Float32Array([f / aspect, 0, 0, 0, 0, f, 0, 0, 0, 0, far * nf, -1, 0, 0, far * near * nf, 0]);
        }

        async function init() {
            if (!navigator.gpu) return;
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            const context = canvas.getContext("webgpu");
            const format = navigator.gpu.getPreferredCanvasFormat();
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: "opaque" });

            const shader = device.createShaderModule({
                code: `
          struct Cam { vp: mat4x4f };
          @group(0) @binding(0) var<uniform> camera : Cam;
          struct VSOut { @builtin(position) pos: vec4f, @location(0) norm: vec3f, @location(1) col: vec3f };

          @vertex
          fn vs_sphere(@location(0) p: vec3f, @location(1) n: vec3f, @location(2) iP: vec3f, @location(3) iS: f32, @location(4) iC: vec3f) -> VSOut {
            var o: VSOut;
            o.pos = camera.vp * vec4f(p * iS + iP, 1.0);
            o.norm = n; o.col = iC;
            return o;
          }

          @vertex
          fn vs_box(@location(0) p: vec3f) -> @builtin(position) vec4f {
            return camera.vp * vec4f(p.x, p.y, p.z - 3.0, 1.0);
          }

          @fragment
          fn fs_sphere(in: VSOut) -> @location(0) vec4f {
            let d = max(dot(in.norm, normalize(vec3f(1, 1, 1))), 0.2);
            return vec4f(in.col * d, 1.0);
          }

          @fragment
          fn fs_box() -> @location(0) vec4f {
            return vec4f(0.0, 0.4, 0.6, 0.1);
          }

          @fragment
          fn fs_edges() -> @location(0) vec4f {
            return vec4f(0.8, 0.8, 0.8, 1.0);
          }
        `
            });

            const bindGroupLayout = device.createBindGroupLayout({
                entries: [{ binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: "uniform" } }]
            });
            const sharedLayout = device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] });

            function createSphere(r, lat, lon) {
                let p = [], n = [], i = [];
                for (let y = 0; y <= lat; y++) {
                    let th = (y / lat) * Math.PI;
                    for (let x = 0; x <= lon; x++) {
                        let ph = (x / lon) * Math.PI * 2;
                        let sx = Math.sin(th) * Math.cos(ph), sy = Math.cos(th), sz = Math.sin(th) * Math.sin(ph);
                        p.push(r * sx, r * sy, r * sz); n.push(sx, sy, sz);
                    }
                }
                for (let y = 0; y < lat; y++) for (let x = 0; x < lon; x++) {
                    let a = y * (lon + 1) + x, b = a + lon + 1; i.push(a, b, a + 1, b, b + 1, a + 1);
                }
                return { pos: new Float32Array(p), norm: new Float32Array(n), ind: new Uint32Array(i) };
            }

            function createBox(s) {
                const p = new Float32Array([
                    -s, -s, s, s, -s, s, s, s, s, -s, s, s, // Front: 0,1,2,3
                    -s, -s, -s, s, -s, -s, s, s, -s, -s, s, -s  // Back: 4,5,6,7
                ]);
                const f = new Uint16Array([
                    0, 1, 2, 0, 2, 3, 5, 4, 7, 5, 7, 6, 4, 0, 3, 4, 3, 7, 1, 5, 6, 1, 6, 2, 3, 2, 6, 3, 6, 7, 4, 5, 1, 4, 1, 0
                ]);
                const e = new Uint16Array([
                    0, 1, 1, 2, 2, 3, 3, 0, 4, 5, 5, 6, 6, 7, 7, 4, 0, 4, 1, 5, 2, 6, 3, 7
                ]);
                return { pos: p, faces: f, edges: e };
            }

            const sData = createSphere(1.0, 20, 20);
            const bData = createBox(5.0);
            const mkB = (d, u) => {
                let b = device.createBuffer({ size: d.byteLength, usage: u, mappedAtCreation: true });
                new d.constructor(b.getMappedRange()).set(d); b.unmap(); return b;
            };

            const spPB = mkB(sData.pos, GPUBufferUsage.VERTEX), spNB = mkB(sData.norm, GPUBufferUsage.VERTEX), spIB = mkB(sData.ind, GPUBufferUsage.INDEX);
            const bxPB = mkB(bData.pos, GPUBufferUsage.VERTEX), bxFIB = mkB(bData.faces, GPUBufferUsage.INDEX), bxEIB = mkB(bData.edges, GPUBufferUsage.INDEX);
            const camBuf = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

            const spherePipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: {
                    module: shader, entryPoint: "vs_sphere", buffers: [
                        { arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] },
                        { arrayStride: 12, attributes: [{ shaderLocation: 1, offset: 0, format: "float32x3" }] },
                        {
                            arrayStride: 32, stepMode: "instance", attributes: [
                                { shaderLocation: 2, offset: 0, format: "float32x3" }, { shaderLocation: 3, offset: 12, format: "float32" }, { shaderLocation: 4, offset: 16, format: "float32x3" }
                            ]
                        }
                    ]
                },
                fragment: { module: shader, entryPoint: "fs_sphere", targets: [{ format }] },
                primitive: { topology: "triangle-list", cullMode: "back" },
                depthStencil: { format: "depth24plus", depthWriteEnabled: true, depthCompare: "less" }
            });

            const boxPipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: { module: shader, entryPoint: "vs_box", buffers: [{ arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] }] },
                fragment: {
                    module: shader, entryPoint: "fs_box", targets: [{
                        format, blend: {
                            color: { srcFactor: "src-alpha", dstFactor: "one-minus-src-alpha", operation: "add" },
                            alpha: { srcFactor: "one", dstFactor: "one", operation: "add" }
                        }
                    }]
                },
                primitive: { topology: "triangle-list" },
                depthStencil: { format: "depth24plus", depthWriteEnabled: false, depthCompare: "less" }
            });

            const edgePipe = device.createRenderPipeline({
                layout: sharedLayout,
                vertex: { module: shader, entryPoint: "vs_box", buffers: [{ arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] }] },
                fragment: { module: shader, entryPoint: "fs_edges", targets: [{ format }] },
                primitive: { topology: "line-list" },
                depthStencil: { format: "depth24plus", depthWriteEnabled: false, depthCompare: "less" }
            });

            const camBG = device.createBindGroup({ layout: bindGroupLayout, entries: [{ binding: 0, resource: { buffer: camBuf } }] });

            let spheres = [], instB = null, dT = null;
            let zoom = 18, yaw = 0, pitch = 0.3, isR = false, lX = 0, lY = 0;

            function resetSim() {
                const count = parseInt(document.getElementById('cntI').value);
                const vScale = parseInt(document.getElementById('velI').value) / 1000;
                spheres = Array.from({ length: count }, () => {
                    let s = 0.3 + Math.random() * 0.6;
                    return { p: [(Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8 - 3], v: [(Math.random() - 0.5) * vScale, (Math.random() - 0.5) * vScale, (Math.random() - 0.5) * vScale], size: s, mass: s ** 3, c: [Math.random(), Math.random(), Math.random()] };
                });
                if (instB) instB.destroy();
                instB = device.createBuffer({ size: count * 32, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
                dT = device.createTexture({ size: [canvas.width, canvas.height], format: "depth24plus", usage: GPUTextureUsage.RENDER_ATTACHMENT });
            }

            document.getElementById('cntI').oninput = e => document.getElementById('cntV').innerText = e.target.value;
            document.getElementById('velI').oninput = e => document.getElementById('velV').innerText = (e.target.value / 100).toFixed(1);
            document.getElementById('fricI').oninput = e => document.getElementById('fricV').innerText = ((1000 - e.target.value) / 10).toFixed(1) + "%";
            document.getElementById('resetBtn').onclick = resetSim;

            canvas.onmousedown = e => { if (e.button === 2) { isR = true; lX = e.clientX; lY = e.clientY; } };
            window.onmouseup = e => { if (e.button === 2) isR = false; };
            window.onmousemove = e => { if (isR) { yaw -= (e.clientX - lX) * 0.005; pitch = Math.max(-1.5, Math.min(1.5, pitch + (e.clientY - lY) * 0.005)); lX = e.clientX; lY = e.clientY; } };
            canvas.onwheel = e => { zoom = Math.max(5, Math.min(60, zoom + e.deltaY * 0.02)); };
            canvas.oncontextmenu = e => e.preventDefault();

            function frame() {
                const fric = parseInt(document.getElementById('fricI').value) / 1000;

                spheres.forEach((s, i) => {
                    s.v = vec3.mul(s.v, fric);
                    s.p = vec3.add(s.p, s.v);

                    // Corrected Wall Collisions (taking radius into account)
                    [0, 1, 2].forEach(a => {
                        let sSize = s.size;
                        let wallPos;
                        let isHit = false;

                        if (a === 2) { // Z-Axis (0 to -10 box, centered at -3)
                            const zMin = -8 + sSize;
                            const zMax = 2 - sSize;
                            if (s.p[a] < zMin) { s.p[a] = zMin; isHit = true; }
                            else if (s.p[a] > zMax) { s.p[a] = zMax; isHit = true; }
                        } else { // X and Y Axes (-5 to 5)
                            const limit = 5 - sSize;
                            if (Math.abs(s.p[a]) > limit) {
                                s.p[a] = Math.sign(s.p[a]) * limit;
                                isHit = true;
                            }
                        }

                        if (isHit) {
                            s.v[a] *= -1.0; // Reverse velocity on that axis
                        }
                    });


                    for (let j = i + 1; j < spheres.length; j++) {
                        let s2 = spheres[j], dV = vec3.sub(s2.p, s.p), dist = Math.sqrt(vec3.dot(dV, dV)), minD = s.size + s2.size;
                        if (dist < minD) {
                            let n = vec3.normalize(dV), sepV = vec3.dot(vec3.sub(s2.v, s.v), n);
                            if (sepV > 0) continue;
                            let imp = vec3.mul(n, -1.8 * sepV / (1 / s.mass + 1 / s2.mass));
                            s.v = vec3.sub(s.v, vec3.mul(imp, 1 / s.mass));
                            s2.v = vec3.add(s2.v, vec3.mul(imp, 1 / s2.mass));
                            let c = vec3.mul(n, (minD - dist) * 0.5);
                            s.p = vec3.sub(s.p, c); s2.p = vec3.add(s2.p, c);
                        }
                    }
                });

                const iD = new Float32Array(spheres.length * 8);
                spheres.forEach((s, i) => iD.set([...s.p, s.size, ...s.c, 0], i * 8));
                device.queue.writeBuffer(instB, 0, iD);

                const target = [0, 0, -3], eye = [target[0] + Math.sin(yaw) * Math.cos(pitch) * zoom, target[1] + Math.sin(pitch) * zoom, target[2] + Math.cos(yaw) * Math.cos(pitch) * zoom];
                const vp = mat4_multiply(mat4_perspective(1.0, canvas.width / canvas.height, 0.1, 100), mat4_lookAt(eye, target, [0, 1, 0]));
                device.queue.writeBuffer(camBuf, 0, vp);

                const enc = device.createCommandEncoder();
                const pass = enc.beginRenderPass({
                    colorAttachments: [{ view: context.getCurrentTexture().createView(), clearValue: [0.05, 0.05, 0.05, 1], loadOp: "clear", storeOp: "store" }],
                    depthStencilAttachment: { view: dT.createView(), depthClearValue: 1, depthLoadOp: "clear", depthStoreOp: "store" }
                });

                pass.setBindGroup(0, camBG);

                // Pass 1: Spheres
                pass.setPipeline(spherePipe); pass.setVertexBuffer(0, spPB); pass.setVertexBuffer(1, spNB); pass.setVertexBuffer(2, instB);
                pass.setIndexBuffer(spIB, "uint32"); pass.drawIndexed(sData.ind.length, spheres.length);

                // Pass 2: Box Faces
                pass.setPipeline(boxPipe); pass.setVertexBuffer(0, bxPB); pass.setIndexBuffer(bxFIB, "uint16");
                pass.drawIndexed(bData.faces.length);

                // Pass 3: Highlight Edges
                pass.setPipeline(edgePipe); pass.setIndexBuffer(bxEIB, "uint16");
                pass.drawIndexed(bData.edges.length);

                pass.end(); device.queue.submit([enc.finish()]);
                requestAnimationFrame(frame);
            }
            resetSim(); frame();
        }
        init();
    </script>
</body>

</html>
