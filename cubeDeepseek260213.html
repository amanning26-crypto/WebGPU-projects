<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU rotating colored cube (GPU matrix math, mouse drag)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
            border: 1px solid #444;
            font-size: 14px;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
        }
        #velocity-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="info">
        🧊 <strong>WebGPU Colored Cube</strong> — rotation built in vertex shader • drag to rotate
    </div>
    <div id="instructions">
        ← → drag mouse to rotate • cube continues spinning after release
    </div>
    <div id="velocity-indicator">
        spin: <span id="spin-speed">0.00</span> rad/frame
    </div>

    <script type="module">
        // --- WebGPU initialization ---
        async function init() {
            if (!navigator.gpu) {
                alert('WebGPU is not supported in this browser. Please enable it or use Chrome Canary.');
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                alert('No appropriate GPU adapter found.');
                return;
            }

            const device = await adapter.requestDevice();
            
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;

            const context = canvas.getContext('webgpu');
            const presentationFormat = navigator.gpu.getPreferredCanvasFormat();
            context.configure({
                device,
                format: presentationFormat,
                alphaMode: 'opaque',
            });

            // --- Geometry: a cube with per-vertex colors (8 vertices, 36 indices) ---
            // Each vertex: position (3 floats) + color (3 floats)
            const vertexData = new Float32Array([
                // front face (z = +0.5)
                -0.5, -0.5,  0.5,   1.0, 0.0, 0.0, // 0: red
                 0.5, -0.5,  0.5,   0.0, 1.0, 0.0, // 1: green
                 0.5,  0.5,  0.5,   0.0, 0.0, 1.0, // 2: blue
                -0.5,  0.5,  0.5,   1.0, 1.0, 0.0, // 3: yellow

                // back face (z = -0.5)
                -0.5, -0.5, -0.5,   1.0, 0.0, 1.0, // 4: magenta
                 0.5, -0.5, -0.5,   0.0, 1.0, 1.0, // 5: cyan
                 0.5,  0.5, -0.5,   1.0, 1.0, 1.0, // 6: white
                -0.5,  0.5, -0.5,   0.5, 0.0, 0.5  // 7: purple
            ]);

            const indexData = new Uint16Array([
                // front
                0, 1, 2,  2, 3, 0,
                // right
                1, 5, 6,  6, 2, 1,
                // back
                5, 4, 7,  7, 6, 5,
                // left
                4, 0, 3,  3, 7, 4,
                // top
                3, 2, 6,  6, 7, 3,
                // bottom
                4, 5, 1,  1, 0, 4
            ]);

            // Vertex buffer
            const vertexBuffer = device.createBuffer({
                size: vertexData.byteLength,
                usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
                mappedAtCreation: true,
            });
            new Float32Array(vertexBuffer.getMappedRange()).set(vertexData);
            vertexBuffer.unmap();

            // Index buffer
            const indexBuffer = device.createBuffer({
                size: indexData.byteLength,
                usage: GPUBufferUsage.INDEX | GPUBufferUsage.COPY_DST,
                mappedAtCreation: true,
            });
            new Uint16Array(indexBuffer.getMappedRange()).set(indexData);
            indexBuffer.unmap();

            // --- Uniform buffer for GPU matrix math ---
            // We pass two angles (pitch, yaw) and a static view-projection matrix.
            // The vertex shader will construct the full rotation matrix from the angles.
            // Layout: 
            //   angles: vec2<f32> (pitch, yaw)       offset 0  (size 8)
            //   padding: vec2<f32>                    offset 8  (size 8, ensures mat4 alignment)
            //   viewProjection: mat4x4<f32>           offset 16 (size 64)
            const uniformBufferSize = 16 + 64; // 16-byte aligned vec4 + 64-byte mat4
            const uniformBuffer = device.createBuffer({
                size: uniformBufferSize,
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
            });

            // Static view-projection matrix (column-major, as expected by WGSL)
            const aspect = canvas.width / canvas.height;
            const projection = perspective(45 * Math.PI/180, aspect, 0.1, 10.0);
            const view = lookAt([2, 2, 4], [0, 0, 0], [0, 1, 0]);
            const viewProjection = multiplyMat4(projection, view); // combine once on CPU

            // Prepare an ArrayBuffer to hold uniform data (angles + viewProjection)
            const uniformArray = new ArrayBuffer(uniformBufferSize);
            const anglesView = new Float32Array(uniformArray, 0, 2); // first two floats
            const vpView = new Float32Array(uniformArray, 16, 16);  // 16 floats for mat4
            vpView.set(viewProjection); // set static part

            // Initial rotation angles
            let angles = { pitch: 0.5, yaw: 0.8 };
            
            // --- Angular velocity for continued rotation ---
            let velocity = { pitch: 0, yaw: 0 };
            const friction = 0.999; // Slight damping so it eventually slows down
            const minVelocity = 0.001; // Stop when very slow

            // --- Mouse drag interaction with momentum ---
            let isDragging = false;
            let lastMouse = { x: 0, y: 0 };
            const rotSpeed = 0.01;
            
            // For velocity calculation
            let lastDx = 0;
            let lastDy = 0;

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouse.x = e.clientX;
                lastMouse.y = e.clientY;
                canvas.style.cursor = 'grabbing';
                
                // Reset velocity when starting new drag
                velocity.pitch = 0;
                velocity.yaw = 0;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - lastMouse.x;
                const dy = e.clientY - lastMouse.y;
                
                // Update angles directly
                angles.yaw   -= dx * rotSpeed;
                angles.pitch += dy * rotSpeed;
                
                // Store velocity for continued rotation after release
                velocity.yaw = -dx * rotSpeed;
                velocity.pitch = dy * rotSpeed;
                
                lastMouse.x = e.clientX;
                lastMouse.y = e.clientY;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                canvas.style.cursor = 'default';
                // Velocity is preserved, so cube continues spinning
            });

            // Prevent default drag behavior
            canvas.addEventListener('dragstart', (e) => e.preventDefault());

            // --- Shader module (matrix math inside vertex shader) ---
            const shaderCode = `
                struct Uniforms {
                    angles: vec2<f32>,      // pitch (x), yaw (y)
                    padding: vec2<f32>,      // alignment
                    viewProjection: mat4x4<f32>,
                };

                @binding(0) @group(0) var<uniform> uniforms: Uniforms;

                struct VertexInput {
                    @location(0) position: vec3<f32>,
                    @location(1) color: vec3<f32>,
                };

                struct VertexOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) color: vec3<f32>,
                };

                // Build a 3x3 rotation matrix from pitch (X rotation) and yaw (Y rotation)
                // All matrix math happens in the shader (GPU), as required.
                fn buildRotation(pitch: f32, yaw: f32) -> mat3x3<f32> {
                    let cY = cos(yaw);
                    let sY = sin(yaw);
                    let cP = cos(pitch);
                    let sP = sin(pitch);

                    // Rotation around Y (yaw)
                    let rotY = mat3x3<f32>(
                        vec3<f32>(cY, 0.0, sY),
                        vec3<f32>(0.0, 1.0, 0.0),
                        vec3<f32>(-sY, 0.0, cY)
                    );

                    // Rotation around X (pitch)
                    let rotX = mat3x3<f32>(
                        vec3<f32>(1.0, 0.0, 0.0),
                        vec3<f32>(0.0, cP, -sP),
                        vec3<f32>(0.0, sP, cP)
                    );

                    // Compose: first pitch, then yaw
                    return rotY * rotX;
                }

                @vertex
                fn vertexMain(input: VertexInput) -> VertexOutput {
                    var output: VertexOutput;

                    // Construct rotation matrix on the GPU from the two angles
                    let rotMatrix = buildRotation(uniforms.angles.x, uniforms.angles.y);

                    // Apply rotation to vertex position (matrix math on GPU)
                    let rotatedPosition = rotMatrix * input.position;

                    // Apply view-projection (also on GPU)
                    output.position = uniforms.viewProjection * vec4<f32>(rotatedPosition, 1.0);
                    
                    // Pass through color
                    output.color = input.color;
                    return output;
                }

                @fragment
                fn fragmentMain(input: VertexOutput) -> @location(0) vec4<f32> {
                    return vec4<f32>(input.color, 1.0);
                }
            `;

            const shaderModule = device.createShaderModule({ code: shaderCode });

            // --- Pipeline setup ---
            const bindGroupLayout = device.createBindGroupLayout({
                entries: [
                    { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } }
                ]
            });

            const pipelineLayout = device.createPipelineLayout({
                bindGroupLayouts: [bindGroupLayout]
            });

            const pipeline = device.createRenderPipeline({
                layout: pipelineLayout,
                vertex: {
                    module: shaderModule,
                    entryPoint: 'vertexMain',
                    buffers: [
                        {
                            arrayStride: 6 * 4, // position(3) + color(3) = 6 floats, each 4 bytes
                            attributes: [
                                { shaderLocation: 0, offset: 0, format: 'float32x3' }, // position
                                { shaderLocation: 1, offset: 3 * 4, format: 'float32x3' } // color
                            ]
                        }
                    ]
                },
                fragment: {
                    module: shaderModule,
                    entryPoint: 'fragmentMain',
                    targets: [{ format: presentationFormat }]
                },
                primitive: {
                    topology: 'triangle-list',
                    cullMode: 'back',
                },
                depthStencil: {
                    depthWriteEnabled: true,
                    depthCompare: 'less',
                    format: 'depth24plus',
                }
            });

            // Depth texture
            const depthTexture = device.createTexture({
                size: [canvas.width, canvas.height],
                format: 'depth24plus',
                usage: GPUTextureUsage.RENDER_ATTACHMENT,
            });

            // Bind group
            const bindGroup = device.createBindGroup({
                layout: bindGroupLayout,
                entries: [
                    { binding: 0, resource: { buffer: uniformBuffer } }
                ]
            });

            // Render pass descriptor (reused each frame)
            const renderPassDescriptor = {
                colorAttachments: [
                    {
                        view: undefined, // to be set per frame
                        loadOp: 'clear',
                        storeOp: 'store',
                        clearValue: { r: 0.1, g: 0.1, b: 0.15, a: 1.0 },
                    }
                ],
                depthStencilAttachment: {
                    view: depthTexture.createView(),
                    depthClearValue: 1.0,
                    depthLoadOp: 'clear',
                    depthStoreOp: 'store',
                }
            };

            // For FPS calculation
            let lastTime = performance.now();
            let frameCount = 0;

            // --- Render loop with momentum ---
            function frame() {
                const now = performance.now();
                const deltaTime = Math.min(16, now - lastTime); // Cap to ~60fps equivalent
                
                if (!isDragging) {
                    // Apply velocity to angles when not dragging
                    angles.yaw += velocity.yaw;
                    angles.pitch += velocity.pitch;
                    
                    // Apply friction
                    velocity.yaw *= friction;
                    velocity.pitch *= friction;
                    
                    // Stop if very slow
                    if (Math.abs(velocity.yaw) < minVelocity) velocity.yaw = 0;
                    if (Math.abs(velocity.pitch) < minVelocity) velocity.pitch = 0;
                }
                
                // Update spin speed indicator
                const spinSpeed = Math.sqrt(velocity.yaw*velocity.yaw + velocity.pitch*velocity.pitch);
                document.getElementById('spin-speed').textContent = spinSpeed.toFixed(3);
                
                // Update uniform buffer with current angles
                anglesView[0] = angles.pitch;
                anglesView[1] = angles.yaw;
                device.queue.writeBuffer(uniformBuffer, 0, uniformArray, 0, uniformArray.byteLength);

                // Get current canvas texture
                const textureView = context.getCurrentTexture().createView();
                renderPassDescriptor.colorAttachments[0].view = textureView;

                const commandEncoder = device.createCommandEncoder();
                const passEncoder = commandEncoder.beginRenderPass(renderPassDescriptor);
                passEncoder.setPipeline(pipeline);
                passEncoder.setBindGroup(0, bindGroup);
                passEncoder.setVertexBuffer(0, vertexBuffer);
                passEncoder.setIndexBuffer(indexBuffer, 'uint16');
                passEncoder.drawIndexed(indexData.length);
                passEncoder.end();

                device.queue.submit([commandEncoder.finish()]);

                lastTime = now;
                requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth * devicePixelRatio;
                canvas.height = window.innerHeight * devicePixelRatio;
                context.configure({
                    device,
                    format: presentationFormat,
                    alphaMode: 'opaque',
                });
                
                // Update projection matrix on resize
                const newAspect = canvas.width / canvas.height;
                const newProjection = perspective(45 * Math.PI/180, newAspect, 0.1, 10.0);
                const newViewProjection = multiplyMat4(newProjection, view);
                vpView.set(newViewProjection);
            });
        }

        // --- Simple column-major matrix utilities (for static view/proj) ---
        function perspective(fov, aspect, near, far) {
            const f = 1.0 / Math.tan(fov / 2);
            return [
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) / (near - far), -1,
                0, 0, (2 * far * near) / (near - far), 0
            ];
        }

        function lookAt(eye, center, up) {
            const z = normalize(sub(eye, center));
            const x = normalize(cross(up, z));
            const y = cross(z, x);
            return [
                x[0], y[0], z[0], 0,
                x[1], y[1], z[1], 0,
                x[2], y[2], z[2], 0,
                -dot(x, eye), -dot(y, eye), -dot(z, eye), 1
            ];
        }

        function multiplyMat4(a, b) {
            let result = new Array(16).fill(0);
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    for (let k = 0; k < 4; k++) {
                        result[j * 4 + i] += a[k * 4 + i] * b[j * 4 + k];
                    }
                }
            }
            return result;
        }

        // Vector helpers
        function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
        function normalize(v) { const len = Math.hypot(...v); return v.map(x => x/len); }
        function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
        function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }

        init().catch(console.error);
    </script>
</body>
</html>
