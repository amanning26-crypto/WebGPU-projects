<html>
<body>
    <canvas id="canvas" width="640" height="480"></canvas>
</body>

<script src="../utils/utils.js"></script>
<script src="../utils/gl-matrix.js"></script>

<script id="shader" type="wgsl">
// (your WGSL unchanged)
@group(0) @binding(0) var<uniform> transform: mat4x4<f32>;
@group(0) @binding(1) var<uniform> projection: mat4x4<f32>;

struct VertexOutput { @builtin(position) clip_position: vec4<f32> };

@vertex
fn vs_main(@location(0) inPos: vec3<f32>) -> VertexOutput {
    var out: VertexOutput;
    out.clip_position = projection * transform * vec4<f32>(inPos, 1.0);
    return out;
}

@fragment
fn fs_main(in: VertexOutput, @builtin(front_facing) face: bool) -> @location(0) vec4<f32> {
   if (face) {
    return vec4<f32>(0.0, 0.0, 1.0, 1.0);
} else {
    return vec4<f32>(0.0, 1.0, 0.0, 1.0);
}

}
</script>

<script>
async function webgpu() {

    // ⭐ ADDED: rotation state
    let angleX = 0;
    let angleY = 0;

    function buildTransform() {
        let m = glMatrix.mat4.create();

        glMatrix.mat4.lookAt(
            m,
            glMatrix.vec3.fromValues(300, 300, 300),
            glMatrix.vec3.fromValues(0, 0, 0),
            glMatrix.vec3.fromValues(0, 0, 1)
        );

        glMatrix.mat4.rotateX(m, m, angleX);
        glMatrix.mat4.rotateY(m, m, angleY);

        return m;
    }

    // -------------------------
    // WebGPU setup (unchanged)
    // -------------------------

    if (!navigator.gpu) throw new Error("WebGPU not supported");

    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();
    const context = configContext(device, canvas);

    const shaderModule = shaderModuleFromCode(device, "shader");

   /* const positions = new Float32Array([
        -100,100,0,  -100,100,200,  100,100,0,  100,100,200,  
        100,-100,0,  100,-100,200,  -100,-100,0, -100,-100,200,
        -100,100,0,  -100,100,200
    ]); 

    const positions = new Float32Array([
        0,100,0,    0,100,100,   100,20,0,    100,20,100,
        50,-100,0, 50,-100,100,  -50,-100,0,  -50,-100,100,
        -100,20,0,  -100,20,100,   0,100,0,     0,100, 100
    ]);
*/
    const positions = new Float32Array([
    // side 0
     0, 100,   0,
     0, 100, 100,

    // side 1
   100,  20,   0,
   100,  20, 100,

    // side 2
    50,-100,   0,
    50,-100, 100,

    // side 3
   -50,-100,   0,
   -50,-100, 100,

    // side 4
  -100,  20,   0,
  -100,  20, 100,

    // close the loop for side 5 (repeat P0)
     0, 100,   0,
     0, 100, 100
]);


    const positionBuffer = createGPUBuffer(device, positions, GPUBufferUsage.VERTEX);

    let transformMatrix = buildTransform();
    let transformUBO = createGPUBuffer(device, transformMatrix, GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST);

    let projectionMatrix = glMatrix.mat4.perspective(glMatrix.mat4.create(), 1.4, 640/480, 0.1, 1000);
    let projectionUBO = createGPUBuffer(device, projectionMatrix, GPUBufferUsage.UNIFORM);

    const uniformBindGroupLayout = device.createBindGroupLayout({
        entries: [
            { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: {} },
            { binding: 1, visibility: GPUShaderStage.VERTEX, buffer: {} }
        ]
    });

    const uniformBindGroup = device.createBindGroup({
        layout: uniformBindGroupLayout,
        entries: [
            { binding: 0, resource: { buffer: transformUBO }},
            { binding: 1, resource: { buffer: projectionUBO }}
        ]
    });

    const pipeline = device.createRenderPipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [uniformBindGroupLayout] }),
        vertex: {
            module: shaderModule,
            entryPoint: "vs_main",
            buffers: [{ arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: "float32x3" }] }]
        },
        fragment: {
            module: shaderModule,
            entryPoint: "fs_main",
            targets: [{ format: navigator.gpu.getPreferredCanvasFormat() }]
        },
        primitive: { topology: "triangle-strip", frontFace: "ccw", cullMode: "none" },
        depthStencil: { format: "depth24plus-stencil8", depthWriteEnabled: true, depthCompare: "less" }
    });

    const depthTexture = device.createTexture({
        size: [canvas.width, canvas.height],
        format: "depth24plus-stencil8",
        usage: GPUTextureUsage.RENDER_ATTACHMENT
    });

    const depthView = depthTexture.createView();

    // ⭐ draw() is inside webgpu() so it can see all variables
    function draw() {
        transformMatrix = buildTransform();
        device.queue.writeBuffer(transformUBO, 0, transformMatrix);

        const colorView = context.getCurrentTexture().createView();

        const encoder = device.createCommandEncoder();
        const pass = encoder.beginRenderPass({
            colorAttachments: [{
                view: colorView,
                clearValue: { r: 0.6, g: 0.6, b: 0.6, a: 1 },
                loadOp: "clear",
                storeOp: "store"
            }],
            depthStencilAttachment: {
                view: depthView,
                depthClearValue: 1,
                depthLoadOp: "clear",
                depthStoreOp: "store",
                stencilClearValue: 0,
                stencilLoadOp: "clear",
                stencilStoreOp: "store"
            }
        });

        pass.setPipeline(pipeline);
        pass.setBindGroup(0, uniformBindGroup);
        pass.setVertexBuffer(0, positionBuffer);

        // draw as many vertices as contained in positions array
        pass.draw( positions.length/3 );

        pass.end();

        device.queue.submit([encoder.finish()]);
    }

    // ⭐ Mouse interaction (inside webgpu so draw() is visible)
    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    canvas.addEventListener("mousedown", e => {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    window.addEventListener("mouseup", () => dragging = false);

    window.addEventListener("mousemove", e => {
        if (!dragging) return;

        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;

        angleY -= dx * 0.01;
        angleX += dy * 0.01;

        draw();   // ⭐ only draw when dragging
    });

    // initial draw
    draw();
}

webgpu();
</script>
</html>
